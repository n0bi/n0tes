<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>n0tes</title>

  <style type="text/css">
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
    }

    body {
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
      font-family: Georgia, "Times New Roman", serif;
      background-color: #0a0a0a;
    }

    body.theme-dark {
      color: #f3f3f3;
    }

    body.theme-light {
      color: #111111;
    }

    body.bg-plain {
      background: #0a0a0a;
      background-color: #0a0a0a;
    }

    body.bg-paper {
      background: #f2f0e8;
      background-color: #f2f0e8;
    }

    body.bg-dawn {
      background: #d7d0c9;
      background: -webkit-linear-gradient(top, #e7ddd4 0%, #d3c7bf 50%, #b8b0a9 100%);
      background: linear-gradient(to bottom, #e7ddd4 0%, #d3c7bf 50%, #b8b0a9 100%);
      background-color: #d3c7bf;
    }

    body.bg-dusk {
      background: #1b2130;
      background: -webkit-linear-gradient(top, #2d3550 0%, #1d2437 55%, #10141d 100%);
      background: linear-gradient(to bottom, #2d3550 0%, #1d2437 55%, #10141d 100%);
      background-color: #1d2437;
    }

    body.bg-forest {
      background: #2b332b;
      background: -webkit-linear-gradient(top, #445247 0%, #313b33 55%, #202720 100%);
      background: linear-gradient(to bottom, #445247 0%, #313b33 55%, #202720 100%);
      background-color: #313b33;
    }

    body.bg-sea {
      background: #1d3138;
      background: -webkit-linear-gradient(top, #3c5861 0%, #274048 55%, #17262c 100%);
      background: linear-gradient(to bottom, #3c5861 0%, #274048 55%, #17262c 100%);
      background-color: #274048;
    }

    body.theme-light.bg-plain {
      background: #f2f2ee;
      background-color: #f2f2ee;
    }

    body.theme-light.bg-dusk {
      background: #d8dde5;
      background: -webkit-linear-gradient(top, #edf0f4 0%, #d9dfe7 60%, #cdd5df 100%);
      background: linear-gradient(to bottom, #edf0f4 0%, #d9dfe7 60%, #cdd5df 100%);
      background-color: #d9dfe7;
    }

    body.theme-light.bg-forest {
      background: #dfe6db;
      background: -webkit-linear-gradient(top, #edf1eb 0%, #dce6d8 55%, #d1d9cd 100%);
      background: linear-gradient(to bottom, #edf1eb 0%, #dce6d8 55%, #d1d9cd 100%);
      background-color: #dce6d8;
    }

    body.theme-light.bg-sea {
      background: #dde7e8;
      background: -webkit-linear-gradient(top, #eef5f5 0%, #dde8e8 55%, #cdd9da 100%);
      background: linear-gradient(to bottom, #eef5f5 0%, #dde8e8 55%, #cdd9da 100%);
      background-color: #dde8e8;
    }

    #app {
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      left: 0;
      overflow: hidden;
    }

    #writerWrap {
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      left: 0;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    #editor {
      display: block;
      min-height: 100%;
      width: auto;
      max-width: none;
      margin: 0;
      padding: 16px 14px 44px 56px;
      box-sizing: border-box;
      outline: none;
      word-wrap: break-word;
      white-space: pre-wrap;
      font-size: 16px;
      line-height: 1.52;
      font-family: Georgia, "Times New Roman", serif;
      text-align: left;
      background: transparent;
    }

    #editor p,
    #editor div {
      margin: 0 0 0.85em 0;
    }

    #editor h1 {
      margin: 0 0 0.7em 0;
      font-size: 1.5em;
      line-height: 1.12;
      font-weight: bold;
    }

    #editor h2 {
      margin: 0 0 0.8em 0;
      font-size: 1.22em;
      line-height: 1.18;
      font-weight: bold;
    }

    #editor blockquote {
      margin: 0 0 0.85em 0;
      padding-left: 12px;
    }

    body.theme-dark #editor blockquote {
      border-left: 2px solid #7a7a7a;
      color: #dddddd;
    }

    body.theme-light #editor blockquote {
      border-left: 2px solid #8f8f88;
      color: #333333;
    }

    body.theme-dark #editor {
      color: #f3f3f3;
    }

    body.theme-light #editor {
      color: #111111;
    }

    #toolbar {
      position: absolute;
      top: 8px;
      left: 8px;
      z-index: 40;
      width: 32px;
      opacity: 1;
      filter: alpha(opacity=100);
    }

    #toolbar.chrome-hidden {
      opacity: 0.18;
      filter: alpha(opacity=18);
    }

    .toolbtn {
      display: block;
      position: relative;
      width: 32px;
      height: 32px;
      margin: 0 0 4px 0;
      padding: 0;
      border-radius: 16px;
      cursor: pointer;
      outline: none;
      box-sizing: border-box;
      -webkit-appearance: none;
      appearance: none;
      background: #ffffff;
      color: #111111;
      border: 1px solid #ffffff;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 12px;
      line-height: 30px;
      text-align: center;
    }

    body.theme-light .toolbtn {
      background: #111111;
      color: #ffffff;
      border: 1px solid #111111;
    }

    .toolbtn.active {
      box-shadow: 0 0 0 2px rgba(140, 140, 140, 0.35);
    }

    .formatbtn {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 15px;
      font-weight: normal;
    }

    #boldBtn {
      font-weight: bold;
    }

    #italicBtn {
      font-style: italic;
      font-weight: normal;
    }

    #underlineBtn {
      font-weight: normal;
      text-decoration: underline;
    }

    #themeBtn {
      line-height: normal;
    }

    #themeBtn .themeGlyph {
      position: absolute;
      left: 0;
      right: 0;
      top: 50%;
      margin-top: -10px;
      display: block;
      text-align: center;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 22px;
      font-weight: normal;
      line-height: 20px;
    }

    #focusBtn {
      font-size: 18px;
      line-height: 27px;
    }

    #menuBtn {
      font-size: 14px;
      line-height: 27px;
    }

    .cornerbtn span {
      position: absolute;
      display: block;
      width: 8px;
      height: 8px;
      font-size: 0;
      line-height: 0;
    }

    .cornerbtn .tl {
      top: 7px;
      left: 7px;
      border-top: 2px solid #111111;
      border-left: 2px solid #111111;
    }

    .cornerbtn .tr {
      top: 7px;
      right: 7px;
      border-top: 2px solid #111111;
      border-right: 2px solid #111111;
    }

    .cornerbtn .bl {
      bottom: 7px;
      left: 7px;
      border-bottom: 2px solid #111111;
      border-left: 2px solid #111111;
    }

    .cornerbtn .br {
      bottom: 7px;
      right: 7px;
      border-bottom: 2px solid #111111;
      border-right: 2px solid #111111;
    }

    body.theme-light .cornerbtn .tl,
    body.theme-light .cornerbtn .tr,
    body.theme-light .cornerbtn .bl,
    body.theme-light .cornerbtn .br {
      border-color: #ffffff;
    }

    .cornerbtn.full-active .tl {
      top: 10px;
      left: 10px;
    }

    .cornerbtn.full-active .tr {
      top: 10px;
      right: 10px;
    }

    .cornerbtn.full-active .bl {
      bottom: 10px;
      left: 10px;
    }

    .cornerbtn.full-active .br {
      bottom: 10px;
      right: 10px;
    }

    #menuPanel {
      display: none;
      position: absolute;
      top: 8px;
      left: 42px;
      z-index: 39;
      width: 152px;
      padding: 7px;
      border-radius: 12px;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
      opacity: 1;
      filter: alpha(opacity=100);
    }

    body.theme-dark #menuPanel {
      background: #121212;
      color: #f4f4f4;
      border: 1px solid #2e2e2e;
    }

    body.theme-light #menuPanel {
      background: #fbfbf8;
      color: #111111;
      border: 1px solid #ccccbf;
    }

    .panelRow {
      margin: 0 0 7px 0;
    }

    .panelLabel {
      display: block;
      margin: 0 0 4px 0;
      font-size: 10px;
      line-height: 1.2;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .panelSelect,
    .panelBtn {
      display: block;
      width: 100%;
      height: 29px;
      padding: 0 8px;
      border-radius: 8px;
      box-sizing: border-box;
      outline: none;
      font-size: 11px;
      -webkit-appearance: none;
      appearance: none;
      font-family: Arial, Helvetica, sans-serif;
    }

    body.theme-dark .panelSelect,
    body.theme-dark .panelBtn {
      background: #ffffff;
      color: #111111;
      border: 1px solid #ffffff;
    }

    body.theme-light .panelSelect,
    body.theme-light .panelBtn {
      background: #111111;
      color: #ffffff;
      border: 1px solid #111111;
    }

    #edgeWake {
      position: absolute;
      top: 0;
      left: 0;
      width: 56px;
      height: 56px;
      z-index: 20;
      display: none;
      background: transparent;
    }

    @media screen and (max-width: 700px) {
      #toolbar {
        top: 8px;
        left: 8px;
        width: 30px;
      }

      .toolbtn {
        width: 30px;
        height: 30px;
        margin-bottom: 4px;
        line-height: 28px;
      }

      .formatbtn {
        font-size: 14px;
      }

      #themeBtn .themeGlyph {
        margin-top: -9px;
        font-size: 20px;
        line-height: 18px;
      }

      #focusBtn {
        font-size: 17px;
        line-height: 25px;
      }

      #menuBtn {
        font-size: 13px;
        line-height: 26px;
      }

      #menuPanel {
        top: 8px;
        left: 40px;
        width: 140px;
        padding: 7px;
      }

      #editor {
        padding: 14px 12px 38px 50px;
        font-size: 15px;
        line-height: 1.46;
      }

      .panelSelect,
      .panelBtn {
        height: 28px;
        font-size: 11px;
      }

      .cornerbtn .tl,
      .cornerbtn .tr,
      .cornerbtn .bl,
      .cornerbtn .br {
        width: 7px;
        height: 7px;
      }

      .cornerbtn .tl { top: 7px; left: 7px; }
      .cornerbtn .tr { top: 7px; right: 7px; }
      .cornerbtn .bl { bottom: 7px; left: 7px; }
      .cornerbtn .br { bottom: 7px; right: 7px; }

      .cornerbtn.full-active .tl { top: 10px; left: 10px; }
      .cornerbtn.full-active .tr { top: 10px; right: 10px; }
      .cornerbtn.full-active .bl { bottom: 10px; left: 10px; }
      .cornerbtn.full-active .br { bottom: 10px; right: 10px; }
    }

    @media screen and (orientation: landscape) and (max-height: 500px) {
      #editor {
        font-size: 15px;
        line-height: 1.42;
        padding-top: 12px;
        padding-bottom: 30px;
      }

      .toolbtn {
        margin-bottom: 3px;
      }
    }
  </style>
</head>
<body class="theme-dark bg-plain">
  <div id="app">
    <div id="edgeWake"></div>

    <div id="writerWrap">
      <div id="editor" contenteditable="true"></div>
    </div>

    <div id="toolbar">
      <button type="button" class="toolbtn formatbtn" id="boldBtn" title="Bold">B</button>
      <button type="button" class="toolbtn formatbtn" id="italicBtn" title="Italic">I</button>
      <button type="button" class="toolbtn formatbtn" id="underlineBtn" title="Underline">U</button>

      <button type="button" class="toolbtn" id="themeBtn" title="Theme">
        <span class="themeGlyph">*</span>
      </button>

      <button type="button" class="toolbtn cornerbtn" id="fullBtn" title="Full screen">
        <span class="tl"></span>

      <button type="button" class="toolbtn" id="focusBtn" title="Focus">·</button>

    <div id="menuPanel">
      <div class="panelRow">

      <div class="panelRow">
        <label class="panelLabel" for="environmentSelect">Environment</label>
        <select class="panelSelect" id="environmentSelect">
          <option value="plain">Plain</option>
          <option value="paper">Paper</option>

        <label class="panelLabel" for="ambientSelect">Ambient</label>
        <select class="panelSelect" id="ambientSelect">
          <option value="silence">Silence</option>
          <option value="hum">Low hum</option>
          <option value="rain">Soft rain</option>

          <option value="chime">Glass tones</option>

      <div class="panelRow">
        <label class="panelLabel" for="volumeSelect">Volume</label>
        <select class="panelSelect" id="volumeSelect">
          <option value="0">0%</option>
          <option value="0.25">25%</option>

          <option value="1">100%</option>
        </select>

      <div class="panelRow">
        <label class="panelLabel" for="typewriterSelect">Typewriter</label>
        <select class="panelSelect" id="typewriterSelect">
          <option value="off">Off</option>
          <option value="on">On</option>
        </select>

      <div class="panelRow">
        <label class="panelLabel" for="focusSelect">Focus mode</label>
        <select class="panelSelect" id="focusSelect">
          <option value="off">Off</option>
          <option value="on">On</option>
        </select>
      </div>

      <div class="panelRow">
        <button type="button" class="panelBtn" id="saveHtmlBtn">Save HTML</button>

      <div class="panelRow">
        <button type="button" class="panelBtn" id="saveTxtBtn">Save TXT</button>

      <div class="panelRow">

      </div>

  </div>

  <script type="text/javascript">
    (function () {
      var editor = document.getElementById("editor");
      var writerWrap = document.getElementById("writerWrap");
      var toolbar = document.getElementById("toolbar");
      var edgeWake = document.getElementById("edgeWake");

      var boldBtn = document.getElementById("boldBtn");
      var italicBtn = document.getElementById("italicBtn");
      var underlineBtn = document.getElementById("underlineBtn");
      var themeBtn = document.getElementById("themeBtn");
      var fullBtn = document.getElementById("fullBtn");
      var focusBtn = document.getElementById("focusBtn");
      var menuBtn = document.getElementById("menuBtn");
      var menuPanel = document.getElementById("menuPanel");

      var fontSelect = document.getElementById("fontSelect");
      var sizeSelect = document.getElementById("sizeSelect");
      var styleSelect = document.getElementById("styleSelect");
      var environmentSelect = document.getElementById("environmentSelect");
      var ambientSelect = document.getElementById("ambientSelect");
      var volumeSelect = document.getElementById("volumeSelect");
      var typewriterSelect = document.getElementById("typewriterSelect");
      var focusSelect = document.getElementById("focusSelect");
      var saveHtmlBtn = document.getElementById("saveHtmlBtn");
      var saveTxtBtn = document.getElementById("saveTxtBtn");
      var emailBtn = document.getElementById("emailBtn");

      var contentKey = "n0tes_content_v8";
      var prefsKey = "n0tes_prefs_v8";
      var storageOK = false;
      var savedRange = null;
      var isDirty = false;
      var autosaveTimer = null;
      var hideChromeTimer = null;
      var ambientPlayer = null;
      var ambientCache = {};
      var seed = 17;

      var prefs = {
        font: "serif",
        size: "16",
        theme: "dark",
        environment: "plain",
        ambient: "silence",
        volume: "0.5",
        typewriter: "off",
        focus: "off"
      };

      var fontMap = {
        serif: 'Georgia, "Times New Roman", serif',
        sans: 'Arial, Helvetica, sans-serif',
        mono: '"Courier New", Courier, monospace',
        palatino: '"Palatino Linotype", Palatino, Georgia, serif'
      };

      function bind(el, eventName, handler) {
        if (el.addEventListener) {
          el.addEventListener(eventName, handler, false);
        } else if (el.attachEvent) {
          el.attachEvent("on" + eventName, handler);
        } else {
          el["on" + eventName] = handler;
        }
      }

      function hasClass(el, className) {
        return new RegExp("(^|\\s)" + className + "(\\s|$)").test(el.className);
      }

      function addClass(el, className) {
        if (!hasClass(el, className)) {
          el.className = el.className ? el.className + " " + className : className;
        }
      }

      function removeClass(el, className) {
        var reg = new RegExp("(^|\\s)" + className + "(\\s|$)", "g");
        el.className = el.className.replace(reg, " ").replace(/\s+/g, " ").replace(/^\s+|\s+$/g, "");
      }

      function stopEvent(evt) {
        evt = evt || window.event;
        if (evt.stopPropagation) {
          evt.stopPropagation();
        }
        evt.cancelBubble = true;
      }

      function testStorage() {
        try {
          var x = "__n0tes_test__";
          window.localStorage.setItem(x, x);
          window.localStorage.removeItem(x);
          return true;
        } catch (e) {
          return false;
        }
      }

      function saveSelectionRange() {
        try {
          if (window.getSelection) {
            var sel = window.getSelection();
            if (sel && sel.rangeCount > 0) {
              savedRange = sel.getRangeAt(0);
            }
          } else if (document.selection) {
            savedRange = document.selection.createRange();
          }
        } catch (e) {}
      }

      function restoreSelectionRange() {
        try {
          if (!savedRange) {
            return;
          }

          if (window.getSelection) {
            var sel = window.getSelection();
            sel.removeAllRanges();
            sel.addRange(savedRange);
          } else if (document.selection && savedRange.select) {
            savedRange.select();
          }
        } catch (e) {}
      }

      function ensureStartContent() {
        var html = editor.innerHTML;
        if (!html || html.replace(/[\s\u00A0]/g, "").replace(/<br>/gi, "") === "") {
          editor.innerHTML = "<div><br></div>";
        }
      }

      function markDirty() {
        isDirty = true;
      }

      function storeContent() {
        if (!storageOK) {
          return;
        }
        try {
          window.localStorage.setItem(contentKey, editor.innerHTML);
          isDirty = false;
        } catch (e) {}
      }

      function loadContent() {
        if (!storageOK) {
          return;
        }
        try {
          var saved = window.localStorage.getItem(contentKey);
          if (saved && saved !== "") {
            editor.innerHTML = saved;
          }
        } catch (e) {}
      }

      function storePrefs() {
        if (!storageOK) {
          return;
        }
        try {
          window.localStorage.setItem(
            prefsKey,
            prefs.font + "|" +
            prefs.size + "|" +
            prefs.theme + "|" +
            prefs.environment + "|" +
            prefs.ambient + "|" +
            prefs.volume + "|" +
            prefs.typewriter + "|" +
            prefs.focus
          );
        } catch (e) {}
      }

      function loadPrefs() {
        if (!storageOK) {
          return;
        }
        try {
          var saved = window.localStorage.getItem(prefsKey);
          var parts;
          if (!saved) {
            return;
          }
          parts = saved.split("|");
          if (parts[0]) { prefs.font = parts[0]; }
          if (parts[1]) { prefs.size = parts[1]; }
          if (parts[2]) { prefs.theme = parts[2]; }
          if (parts[3]) { prefs.environment = parts[3]; }
          if (parts[4]) { prefs.ambient = parts[4]; }
          if (parts[5]) { prefs.volume = parts[5]; }
          if (parts[6]) { prefs.typewriter = parts[6]; }
          if (parts[7]) { prefs.focus = parts[7]; }
        } catch (e) {}
      }

      function applyBodyClasses() {
        var cls = "theme-" + prefs.theme + " bg-" + prefs.environment;
        document.body.className = cls;
      }

      function applyPrefs() {
        editor.style.fontFamily = fontMap[prefs.font] || fontMap.serif;
        editor.style.fontSize = prefs.size + "px";
        applyBodyClasses();

        fontSelect.value = prefs.font;
        sizeSelect.value = prefs.size;
        environmentSelect.value = prefs.environment;
        ambientSelect.value = prefs.ambient;
        volumeSelect.value = prefs.volume;
        typewriterSelect.value = prefs.typewriter;
        focusSelect.value = prefs.focus;

        if (prefs.focus === "on") {
          addClass(focusBtn, "active");
          scheduleChromeHide();
        } else {
          removeClass(focusBtn, "active");
          showChrome();
        }

        updateFullButton();
      }

      function runCommand(command, value) {
        editor.focus();
        restoreSelectionRange();

        try {
          document.execCommand("styleWithCSS", false, false);
        } catch (e) {}

        try {
          document.execCommand(command, false, value || null);
        } catch (e) {}

        saveSelectionRange();
        updateFormatButtons();
        markDirty();
      }

      function applyBlock(tagName) {
        editor.focus();
        restoreSelectionRange();

        try {
          document.execCommand("formatBlock", false, "<" + tagName + ">");
        } catch (e) {}

        try {
          document.execCommand("formatBlock", false, tagName);
        } catch (e) {}

        saveSelectionRange();
        markDirty();

      function getPlainText() {

      function escapeHtml(text) {
        return String(text)

          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")

      function cleanFileName(name, ext) {
        var value = name || "n0tes";

        if (!value) {
          value = "n0tes";
        }
        if (value.toLowerCase().indexOf(ext) === -1) {
          value += ext;
        }
        return value;

      function buildExportHtml(title) {
        var bgClass = prefs.environment;
        var bgCss = "#0a0a0a";

        var quoteBorder = prefs.theme === "light" ? "#8f8f88" : "#7a7a7a";
        var quoteColor = prefs.theme === "light" ? "#333333" : "#dddddd";
        var fontCss = fontMap[prefs.font] || fontMap.serif;
        var parts = [];

        if (bgClass === "paper") {

        } else if (bgClass === "dawn") {
          bgCss = "#d3c7bf";
        } else if (bgClass === "dusk") {
          bgCss = prefs.theme === "light" ? "#d9dfe7" : "#1d2437";
        } else if (bgClass === "forest") {
          bgCss = prefs.theme === "light" ? "#dce6d8" : "#313b33";
        } else if (bgClass === "sea") {
          bgCss = prefs.theme === "light" ? "#dde8e8" : "#274048";
        } else if (bgClass === "plain") {
          bgCss = prefs.theme === "light" ? "#f2f2ee" : "#0a0a0a";
        }

        parts.push("<!DOCTYPE html>");
        parts.push("<html>");
        parts.push("<head>");
        parts.push("<meta charset=\"utf-8\">");
        parts.push("<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no\">");
        parts.push("<title>" + escapeHtml(title) + "</title>");
        parts.push("<style type=\"text/css\">");
        parts.push("html,body{margin:0;padding:0;background:" + bgCss + ";color:" + fg + ";}");
        parts.push("body{font-family:" + fontCss + ";-webkit-text-size-adjust:100%;text-size-adjust:100%;}");
        parts.push("#note{width:auto;max-width:none;margin:0;padding:16px 14px 40px 14px;font-size:" + prefs.size + "px;line-height:1.52;word-wrap:break-word;white-space:normal;text-align:left;}");
        parts.push("#note p,#note div{margin:0 0 0.85em 0;}");
        parts.push("#note h1{margin:0 0 0.7em 0;font-size:1.5em;line-height:1.12;font-weight:bold;}");
        parts.push("#note h2{margin:0 0 0.8em 0;font-size:1.22em;line-height:1.18;font-weight:bold;}");
        parts.push("#note blockquote{margin:0 0 0.85em 0;padding-left:12px;border-left:2px solid " + quoteBorder + ";color:" + quoteColor + ";}");

        parts.push("</head>");
        parts.push("<body>");
        parts.push("<div id=\"note\">");
        parts.push(editor.innerHTML);
        parts.push("</div>");
        parts.push("</body>");

      }

      function simulateClick(el) {
        try {
          if (el.click) {
            el.click();

        try {
          var evt = document.createEvent("MouseEvents");

      function downloadTextFile(fileName, text, mimeType) {

        mimeType = mimeType || "text/plain";

        if (window.Blob && window.URL && URL.createObjectURL) {
          try {
            blob = new Blob([text], { type: mimeType + ";charset=utf-8" });

            if (window.navigator && navigator.msSaveBlob) {
              navigator.msSaveBlob(blob, fileName);
              return;
            }

            url = URL.createObjectURL(blob);
            a = document.createElement("a");
            a.href = url;

            if (typeof a.download !== "undefined") {
              a.download = fileName;
              try {
                document.body.appendChild(a);
              } catch (e) {}
              simulateClick(a);
              setTimeout(function () {
                try {
                  if (a.parentNode) {
                    a.parentNode.removeChild(a);
                  }
                } catch (e) {}
                try {
                  URL.revokeObjectURL(url);
                } catch (e) {}
              }, 500);
              return;
            } else {
              fallbackUrl = window.open(url, "_blank");
              if (!fallbackUrl) {
                window.location.href = url;
              }
              return;
            }
          } catch (e) {}
        }

        try {
          fallbackUrl = "data:" + mimeType + ";charset=utf-8," + encodeURIComponent(text);
          if (!window.open(fallbackUrl, "_blank")) {
            window.location.href = fallbackUrl;
          }
        } catch (e) {
          alert("Save is not supported in this browser.");
        }
      }

      function nextRand() {
        seed = (seed * 1103515245 + 12345) & 2147483647;
        return seed / 2147483647;
      }

      function clampByte(n) {
        if (n < 0) { return 0; }
        if (n > 255) { return 255; }
        return n;
      }

      function push16(arr, value) {
        arr[arr.length] = value & 255;
        arr[arr.length] = (value >> 8) & 255;
      }

      function push32(arr, value) {
        arr[arr.length] = value & 255;
        arr[arr.length] = (value >> 8) & 255;
        arr[arr.length] = (value >> 16) & 255;
        arr[arr.length] = (value >> 24) & 255;

      function bytesToString(arr) {

        for (i = 0; i < arr.length; i++) {

        }
        return out;
      }

      function base64Encode(input) {
        var chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/";
        var str = input;
        var output = "";
        var i = 0;
        var chr1, chr2, chr3, enc1, enc2, enc3, enc4;

        while (i < str.length) {
          chr1 = str.charCodeAt(i++);
          chr2 = str.charCodeAt(i++);
          chr3 = str.charCodeAt(i++);

          enc1 = chr1 >> 2;
          enc2 = ((chr1 & 3) << 4) | (chr2 >> 4);
          enc3 = ((chr2 & 15) << 2) | (chr3 >> 6);
          enc4 = chr3 & 63;

          if (isNaN(chr2)) {
            enc3 = 64;
            enc4 = 64;
          } else if (isNaN(chr3)) {
            enc4 = 64;
          }

          output = output +
            chars.charAt(enc1) +
            chars.charAt(enc2) +
            (enc3 === 64 ? "=" : chars.charAt(enc3)) +
            (enc4 === 64 ? "=" : chars.charAt(enc4));
        }

        return output;
      }

      function buildAmbientDataUri(kind) {
        var sampleRate = 8000;
        var seconds = 4;
        var sampleCount = sampleRate * seconds;
        var dataBytes = [];
        var bytes = [];
        var i, t, sample, v;
        var noise = 0;
        var noise2 = 0;
        var burst = 0;
        var burst2 = 0;

        for (i = 0; i < sampleCount; i++) {

          sample = 0;

          if (kind === "hum") {

          } else if (kind === "rain") {

            noise2 = (noise2 * 0.70) + (((nextRand() * 2) - 1) * 0.03);
            sample = noise + noise2 + (Math.sin(2 * Math.PI * 0.12 * t) * 0.015);
          } else if (kind === "shore") {
            noise = (noise * 0.95) + (((nextRand() * 2) - 1) * 0.035);
            sample =
              (Math.sin(2 * Math.PI * 55 * t) * 0.06) +
              (Math.sin(2 * Math.PI * 82 * t) * 0.03) +
              (Math.sin(2 * Math.PI * 0.18 * t) * 0.08) +
              noise;

            cycle = t % 1.35;
            burst = 0;
            burst2 = 0;

              burst2 = Math.sin(2 * Math.PI * 880 * t) * (1 - (cycle / 0.28)) * 0.12;

            sample =
              (Math.sin(2 * Math.PI * 196 * t) * 0.03) +
              burst + burst2;

          v = 128 + (sample * 110);
          dataBytes[dataBytes.length] = clampByte(parseInt(v, 10));

        bytes[bytes.length] = 82;
        bytes[bytes.length] = 73;
        bytes[bytes.length] = 70;
        bytes[bytes.length] = 70;
        push32(bytes, 36 + dataBytes.length);
        bytes[bytes.length] = 87;
        bytes[bytes.length] = 65;
        bytes[bytes.length] = 86;
        bytes[bytes.length] = 69;

        bytes[bytes.length] = 102;
        bytes[bytes.length] = 109;
        bytes[bytes.length] = 116;
        bytes[bytes.length] = 32;
        push32(bytes, 16);
        push16(bytes, 1);
        push16(bytes, 1);
        push32(bytes, sampleRate);
        push32(bytes, sampleRate);
        push16(bytes, 1);
        push16(bytes, 8);

        bytes[bytes.length] = 100;
        bytes[bytes.length] = 97;
        bytes[bytes.length] = 116;
        bytes[bytes.length] = 97;
        push32(bytes, dataBytes.length);

      function ensureAmbientSource(kind) {
        if (ambientCache[kind]) {
          return ambientCache[kind];
        }
        ambientCache[kind] = buildAmbientDataUri(kind);
        return ambientCache[kind];

      function stopAmbient() {
        if (!ambientPlayer) {
          return;
        }

        try {
          if (ambientPlayer.pause) {
            ambientPlayer.pause();
          }
        } catch (e) {}

        try {
          ambientPlayer.currentTime = 0;
        } catch (e) {}
      }

      function setAmbient(kind) {
        prefs.ambient = kind;
        storePrefs();

        if (kind === "silence") {
          stopAmbient();
          return;
        }

        if (!window.Audio) {
          return;
        }

        if (!ambientPlayer) {
          try {
            ambientPlayer = new Audio();
          } catch (e) {
            ambientPlayer = null;
          }
        }

        if (!ambientPlayer) {
          return;
        }

        try {
          ambientPlayer.pause();
        } catch (e) {}

        try {
          ambientPlayer.src = ensureAmbientSource(kind);
        } catch (e) {}

        try {
          ambientPlayer.loop = true;
        } catch (e) {}

        try {
          ambientPlayer.volume = parseFloat(prefs.volume, 10);
        } catch (e) {}

        try {
          ambientPlayer.play();
        } catch (e) {}

        bind(ambientPlayer, "ended", function () {
          try {
            ambientPlayer.currentTime = 0;
            ambientPlayer.play();
          } catch (e) {}
        });
      }

      function updateAmbientVolume() {
        if (!ambientPlayer) {

      function getCaretRect() {
        var sel, range, rects, rect, marker;

        try {
          if (window.getSelection) {
            sel = window.getSelection();
            if (!sel || !sel.rangeCount) {
              return null;
            }

            range = sel.getRangeAt(0).cloneRange();
            range.collapse(true);

            if (range.getClientRects) {
              rects = range.getClientRects();
              if (rects && rects.length) {
                return rects[0];
              }
            }

            marker = document.createElement("span");
            marker.appendChild(document.createTextNode("\u200b"));
            range.insertNode(marker);

            rect = marker.getBoundingClientRect ? marker.getBoundingClientRect() : null;

            range.setStartAfter(marker);
            range.collapse(true);

            if (marker.parentNode) {
              marker.parentNode.removeChild(marker);
            }

            sel.removeAllRanges();
            sel.addRange(range);

            return rect;

            range = document.selection.createRange();
            return {
              top: range.boundingTop,
              left: range.boundingLeft

      function keepCaretNearMiddle() {
        var caretRect, wrapRect, currentPos, targetPos, delta;

        caretRect = getCaretRect();
        wrapRect = writerWrap.getBoundingClientRect ? writerWrap.getBoundingClientRect() : null;

        if (!caretRect || !wrapRect) {

        currentPos = caretRect.top - wrapRect.top;
        targetPos = parseInt(writerWrap.clientHeight / 2, 10);
        delta = currentPos - targetPos;

        if (delta > 18 || delta < -18) {
          writerWrap.scrollTop = writerWrap.scrollTop + delta;
        }
