<head>

  <style type="text/css">
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
    }

    body {
      -webkit-text-size-adjust: 100%;

    }

    body.theme-dark {
      background: #0a0a0a;
      color: #f4f4f4;
    }

    body.theme-light {
      background: #f2f2ee;
      color: #111111;
    }

    #app {
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      left: 0;
      overflow: hidden;
    }

    #writerWrap {
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      left: 0;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    #editor {
      display: block;
      min-height: 100%;
      width: auto;
      max-width: none;
      margin: 0;
      padding: 18px 66px 48px 16px;
      box-sizing: border-box;
      outline: none;
      word-wrap: break-word;
      white-space: pre-wrap;
      font-size: 16px;
      line-height: 1.52;
      font-family: Georgia, "Times New Roman", serif;
      text-align: left;
    }

    #editor p,
    #editor div {
      margin: 0 0 0.85em 0;
    }

    #editor h1 {
      margin: 0 0 0.7em 0;
      font-size: 1.5em;
      line-height: 1.12;
      font-weight: bold;
    }

    #editor h2 {
      margin: 0 0 0.8em 0;
      font-size: 1.22em;
      line-height: 1.18;
      font-weight: bold;
    }

    #editor blockquote {
      margin: 0 0 0.85em 0;
      padding-left: 12px;
    }

    body.theme-dark #editor blockquote {
      border-left: 2px solid #5c5c5c;
      color: #d8d8d8;
    }

    body.theme-light #editor blockquote {
      border-left: 2px solid #96968d;
      color: #333333;
    }

    #toolbar {
      position: absolute;
      top: 12px;
      right: 10px;
      z-index: 30;
      width: 36px;
    }

    .toolbtn {
      display: block;
      position: relative;
      width: 32px;
      height: 32px;
      margin: 0 0 8px 0;
      padding: 0;
      border-radius: 16px;
      cursor: pointer;
      outline: none;
      box-sizing: border-box;
      -webkit-appearance: none;
      appearance: none;
      background: #ffffff;
      color: #111111;
      border: 1px solid #ffffff;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 12px;
      line-height: 30px;
      text-align: center;
    }

    body.theme-light .toolbtn {
      background: #111111;
      color: #ffffff;
      border: 1px solid #111111;
    }

    .toolbtn.active {
      box-shadow: 0 0 0 2px rgba(140, 140, 140, 0.35);
    }

    .formatbtn {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 16px;
      font-weight: bold;
    }

    #italicBtn {
      font-style: italic;
    }

    #themeBtn {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 22px;
      font-weight: bold;
      line-height: 30px;
      text-align: center;
    }

    #menuBtn {
      font-size: 15px;
      line-height: 28px;
    }

    .cornerbtn span {
      position: absolute;
      display: block;
      width: 8px;
      height: 8px;
      font-size: 0;
      line-height: 0;
    }

    .cornerbtn .tl {
      top: 7px;
      left: 7px;
      border-top: 2px solid #111111;
      border-left: 2px solid #111111;
    }

    .cornerbtn .tr {
      top: 7px;
      right: 7px;
      border-top: 2px solid #111111;
      border-right: 2px solid #111111;
    }

    .cornerbtn .bl {
      bottom: 7px;
      left: 7px;
      border-bottom: 2px solid #111111;
      border-left: 2px solid #111111;
    }

    .cornerbtn .br {
      bottom: 7px;
      right: 7px;
      border-bottom: 2px solid #111111;
      border-right: 2px solid #111111;
    }

    body.theme-light .cornerbtn .tl,
    body.theme-light .cornerbtn .tr,
    body.theme-light .cornerbtn .bl,
    body.theme-light .cornerbtn .br {
      border-color: #ffffff;
    }

    .cornerbtn.full-active .tl {
      top: 10px;
      left: 10px;
    }

    .cornerbtn.full-active .tr {
      top: 10px;
      right: 10px;
    }

    .cornerbtn.full-active .bl {
      bottom: 10px;
      left: 10px;
    }

    .cornerbtn.full-active .br {
      bottom: 10px;
      right: 10px;
    }

    #menuPanel {
      display: none;
      position: absolute;
      top: 12px;
      right: 52px;
      z-index: 29;
      width: 156px;
      padding: 8px;
      border-radius: 12px;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body.theme-dark #menuPanel {
      background: #121212;
      color: #f4f4f4;
      border: 1px solid #2e2e2e;
    }

    body.theme-light #menuPanel {
      background: #fbfbf8;
      color: #111111;
      border: 1px solid #ccccbf;
    }

    .panelRow {
      margin: 0 0 8px 0;
    }

    .panelLabel {
      display: block;
      margin: 0 0 4px 0;
      font-size: 10px;
      line-height: 1.2;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .panelSelect,
    .panelBtn {
      display: block;
      width: 100%;
      height: 30px;
      padding: 0 8px;
      border-radius: 8px;
      box-sizing: border-box;
      outline: none;
      font-size: 12px;
      -webkit-appearance: none;
      appearance: none;
      font-family: Arial, Helvetica, sans-serif;
    }

    body.theme-dark .panelSelect,
    body.theme-dark .panelBtn {
      background: #ffffff;
      color: #111111;
      border: 1px solid #ffffff;
    }

    body.theme-light .panelSelect,
    body.theme-light .panelBtn {
      background: #111111;
      color: #ffffff;
      border: 1px solid #111111;
    }

    @media screen and (max-width: 700px) {
      #toolbar {
        top: 8px;
        right: 8px;
        width: 32px;
      }

      .toolbtn {
        width: 30px;
        height: 30px;
        line-height: 28px;
        margin-bottom: 6px;
      }

      .formatbtn {
        font-size: 15px;
      }

      #themeBtn {
        font-size: 21px;

      }

      #menuBtn {

      }

      #menuPanel {
        top: 8px;

      }

      #editor {
        padding: 14px 52px 42px 12px;
        font-size: 15px;

        max-width: none;
        margin: 0;
        text-align: left;
      }

      .panelSelect,
      .panelBtn {
        height: 28px;

      }

      .cornerbtn .tl,
      .cornerbtn .tr,
      .cornerbtn .bl,

        width: 7px;

      }

      .cornerbtn .tl { top: 7px; left: 7px; }
      .cornerbtn .tr { top: 7px; right: 7px; }
      .cornerbtn .bl { bottom: 7px; left: 7px; }
      .cornerbtn .br { bottom: 7px; right: 7px; }

      .cornerbtn.full-active .tl { top: 10px; left: 10px; }
      .cornerbtn.full-active .tr { top: 10px; right: 10px; }
      .cornerbtn.full-active .bl { bottom: 10px; left: 10px; }
      .cornerbtn.full-active .br { bottom: 10px; right: 10px; }
    }

    @media screen and (orientation: landscape) and (max-height: 500px) {
      #editor {
        font-size: 15px;
        line-height: 1.42;
        padding-top: 12px;
        padding-bottom: 38px;
      }

      .toolbtn {
        margin-bottom: 5px;
      }
    }
  </style>
</head>
<body class="theme-dark">
  <div id="app">
    <div id="writerWrap">
      <div id="editor" contenteditable="true"></div>
    </div>

    <div id="toolbar">
      <button type="button" class="toolbtn formatbtn" id="boldBtn" title="Bold">B</button>
      <button type="button" class="toolbtn formatbtn" id="italicBtn" title="Italic">I</button>
      <button type="button" class="toolbtn formatbtn" id="underlineBtn" title="Underline">U</button>
      <button type="button" class="toolbtn" id="themeBtn" title="Theme">*</button>

      <button type="button" class="toolbtn cornerbtn" id="fullBtn" title="Full screen">
        <span class="tl"></span>
        <span class="tr"></span>
        <span class="bl"></span>
        <span class="br"></span>
      </button>

      <button type="button" class="toolbtn" id="menuBtn" title="More">+</button>
    </div>

    <div id="menuPanel">
      <div class="panelRow">
        <label class="panelLabel" for="fontSelect">Font</label>
        <select class="panelSelect" id="fontSelect">
          <option value="serif">Georgia</option>
          <option value="sans">Arial</option>
          <option value="mono">Courier</option>
        </select>
      </div>

      <div class="panelRow">
        <label class="panelLabel" for="sizeSelect">Text size</label>
        <select class="panelSelect" id="sizeSelect">
          <option value="14">14 px</option>
          <option value="15">15 px</option>
          <option value="16">16 px</option>
          <option value="17">17 px</option>
          <option value="18">18 px</option>
          <option value="20">20 px</option>
          <option value="22">22 px</option>
        </select>
      </div>

      <div class="panelRow">
        <label class="panelLabel" for="styleSelect">Paragraph style</label>
        <select class="panelSelect" id="styleSelect">
          <option value="P">Paragraph</option>
          <option value="H1">Heading 1</option>
          <option value="H2">Heading 2</option>
          <option value="BLOCKQUOTE">Quote</option>
        </select>
      </div>

      <div class="panelRow">
        <button type="button" class="panelBtn" id="saveBtn">Save HTML</button>
      </div>

      <div class="panelRow">
        <button type="button" class="panelBtn" id="emailBtn">Email text</button>
      </div>
    </div>
  </div>

  <script type="text/javascript">
    (function () {
      var editor = document.getElementById("editor");
      var boldBtn = document.getElementById("boldBtn");
      var italicBtn = document.getElementById("italicBtn");
      var underlineBtn = document.getElementById("underlineBtn");
      var themeBtn = document.getElementById("themeBtn");
      var fullBtn = document.getElementById("fullBtn");
      var menuBtn = document.getElementById("menuBtn");
      var menuPanel = document.getElementById("menuPanel");
      var fontSelect = document.getElementById("fontSelect");
      var sizeSelect = document.getElementById("sizeSelect");
      var styleSelect = document.getElementById("styleSelect");
      var saveBtn = document.getElementById("saveBtn");
      var emailBtn = document.getElementById("emailBtn");

      var contentKey = "n0tes_content_v6";
      var prefsKey = "n0tes_prefs_v6";
      var storageOK = false;
      var savedRange = null;
      var isDirty = false;
      var autosaveTimer = null;

      var prefs = {
        font: "serif",
        size: "16",
        theme: "dark"
      };

      var fontMap = {
        serif: 'Georgia, "Times New Roman", serif',
        sans: 'Arial, Helvetica, sans-serif',
        mono: '"Courier New", Courier, monospace'
      };

      function bind(el, eventName, handler) {
        if (el.addEventListener) {
          el.addEventListener(eventName, handler, false);
        } else if (el.attachEvent) {
          el.attachEvent("on" + eventName, handler);
        } else {
          el["on" + eventName] = handler;
        }
      }

      function hasClass(el, className) {
        return new RegExp("(^|\\s)" + className + "(\\s|$)").test(el.className);
      }

      function addClass(el, className) {
        if (!hasClass(el, className)) {
          el.className = el.className ? el.className + " " + className : className;
        }
      }

      function removeClass(el, className) {
        var reg = new RegExp("(^|\\s)" + className + "(\\s|$)", "g");
        el.className = el.className.replace(reg, " ").replace(/\s+/g, " ").replace(/^\s+|\s+$/g, "");
      }

      function stopEvent(evt) {
        evt = evt || window.event;
        if (evt.stopPropagation) {
          evt.stopPropagation();
        }
        evt.cancelBubble = true;
      }

      function testStorage() {
        try {
          var x = "__n0tes_test__";
          window.localStorage.setItem(x, x);
          window.localStorage.removeItem(x);
          return true;
        } catch (e) {
          return false;
        }
      }

      function saveSelectionRange() {
        try {
          if (window.getSelection) {
            var sel = window.getSelection();
            if (sel && sel.rangeCount > 0) {
              savedRange = sel.getRangeAt(0);
            }
          } else if (document.selection) {
            savedRange = document.selection.createRange();
          }
        } catch (e) {}
      }

      function restoreSelectionRange() {
        try {
          if (!savedRange) {
            return;
          }

          if (window.getSelection) {
            var sel = window.getSelection();
            sel.removeAllRanges();
            sel.addRange(savedRange);
          } else if (document.selection && savedRange.select) {
            savedRange.select();
          }
        } catch (e) {}
      }

      function ensureStartContent() {
        var html = editor.innerHTML;
        if (!html || html.replace(/[\s\u00A0]/g, "").replace(/<br>/gi, "") === "") {
          editor.innerHTML = "<div><br></div>";
        }
      }

      function markDirty() {
        isDirty = true;
      }

      function storeContent() {
        if (!storageOK) {
          return;
        }
        try {
          window.localStorage.setItem(contentKey, editor.innerHTML);
          isDirty = false;
        } catch (e) {}
      }

      function loadContent() {
        if (!storageOK) {
          return;
        }
        try {
          var saved = window.localStorage.getItem(contentKey);
          if (saved && saved !== "") {
            editor.innerHTML = saved;
          }
        } catch (e) {}
      }

      function storePrefs() {
        if (!storageOK) {
          return;
        }
        try {
          window.localStorage.setItem(
            prefsKey,
            prefs.font + "|" + prefs.size + "|" + prefs.theme
          );
        } catch (e) {}
      }

      function loadPrefs() {
        if (!storageOK) {
          return;
        }
        try {
          var saved = window.localStorage.getItem(prefsKey);
          var parts;
          if (!saved) {
            return;
          }
          parts = saved.split("|");
          if (parts[0]) { prefs.font = parts[0]; }
          if (parts[1]) { prefs.size = parts[1]; }
          if (parts[2]) { prefs.theme = parts[2]; }
        } catch (e) {}
      }

      function applyPrefs() {
        editor.style.fontFamily = fontMap[prefs.font] || fontMap.serif;
        editor.style.fontSize = prefs.size + "px";

        if (prefs.theme === "light") {
          document.body.className = "theme-light";
        } else {
          document.body.className = "theme-dark";
        }

        fontSelect.value = prefs.font;
        sizeSelect.value = prefs.size;

        updateFullButton();
      }

      function runCommand(command, value) {
        editor.focus();
        restoreSelectionRange();

        try {
          document.execCommand("styleWithCSS", false, false);
        } catch (e) {}

        try {
          document.execCommand(command, false, value || null);
        } catch (e) {}

        saveSelectionRange();
        updateFormatButtons();
        markDirty();
      }

      function applyBlock(tagName) {
        editor.focus();
        restoreSelectionRange();

        try {
          document.execCommand("formatBlock", false, "<" + tagName + ">");
        } catch (e) {}

        try {
          document.execCommand("formatBlock", false, tagName);
        } catch (e) {}

        saveSelectionRange();
        markDirty();
      }

      function setCommandState(button, command) {
        var state = false;
        try {
          state = document.queryCommandState(command);
        } catch (e) {
          state = false;
        }

        if (state) {
          addClass(button, "active");
        } else {
          removeClass(button, "active");
        }
      }

      function updateFormatButtons() {
        setCommandState(boldBtn, "bold");
        setCommandState(italicBtn, "italic");
        setCommandState(underlineBtn, "underline");
      }

      function toggleMenu() {
        if (menuPanel.style.display === "block") {
          menuPanel.style.display = "none";
          removeClass(menuBtn, "active");
        } else {
          menuPanel.style.display = "block";
          addClass(menuBtn, "active");
        }
      }

      function toggleTheme() {
        prefs.theme = prefs.theme === "light" ? "dark" : "light";
        applyPrefs();
        storePrefs();
        editor.focus();
      }

      function getPlainText() {
        if (typeof editor.innerText !== "undefined") {
          return editor.innerText;
        }
        if (typeof editor.textContent !== "undefined") {
          return editor.textContent;
        }
        return "";
      }

      function escapeHtml(text) {
        return String(text)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function cleanFileName(name) {
        var value = name || "n0tes";
        value = value.replace(/[\\\/:\*\?\"<>\|]+/g, "_");
        value = value.replace(/^\s+|\s+$/g, "");
        if (!value) {
          value = "n0tes";
        }
        if (value.toLowerCase().indexOf(".html") === -1) {
          value += ".html";
        }
        return value;
      }

      function buildExportHtml(title) {
        var bg = prefs.theme === "light" ? "#f2f2ee" : "#0a0a0a";
        var fg = prefs.theme === "light" ? "#111111" : "#f4f4f4";
        var quoteBorder = prefs.theme === "light" ? "#96968d" : "#5c5c5c";
        var quoteColor = prefs.theme === "light" ? "#333333" : "#d8d8d8";
        var fontCss = fontMap[prefs.font] || fontMap.serif;
        var parts = [];

        parts.push("<!DOCTYPE html>");
        parts.push("<html>");
        parts.push("<head>");
        parts.push("<meta charset=\"utf-8\">");
        parts.push("<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no\">");
        parts.push("<title>" + escapeHtml(title) + "</title>");
        parts.push("<style type=\"text/css\">");
        parts.push("html,body{margin:0;padding:0;background:" + bg + ";color:" + fg + ";}");
        parts.push("body{font-family:" + fontCss + ";-webkit-text-size-adjust:100%;text-size-adjust:100%;}");
        parts.push("#note{width:auto;max-width:none;margin:0;padding:18px 16px 40px 16px;font-size:" + prefs.size + "px;line-height:1.52;word-wrap:break-word;white-space:normal;text-align:left;}");
        parts.push("#note p,#note div{margin:0 0 0.85em 0;}");
        parts.push("#note h1{margin:0 0 0.7em 0;font-size:1.5em;line-height:1.12;font-weight:bold;}");
        parts.push("#note h2{margin:0 0 0.8em 0;font-size:1.22em;line-height:1.18;font-weight:bold;}");
        parts.push("#note blockquote{margin:0 0 0.85em 0;padding-left:12px;border-left:2px solid " + quoteBorder + ";color:" + quoteColor + ";}");
        parts.push("</style>");
        parts.push("</head>");
        parts.push("<body>");
        parts.push("<div id=\"note\">");
        parts.push(editor.innerHTML);
        parts.push("</div>");
        parts.push("</body>");
        parts.push("</html>");

        return parts.join("");
      }

      function simulateClick(el) {
        try {
          if (el.click) {
            el.click();
            return;
          }
        } catch (e) {}

        try {
          var evt = document.createEvent("MouseEvents");
          evt.initMouseEvent("click", true, true, window, 1, 0, 0, 0, 0, false, false, false, false, 0, null);
          el.dispatchEvent(evt);
        } catch (e) {}
      }

      function downloadTextFile(fileName, text, mimeType) {
        var blob, url, a, fallbackUrl;

        mimeType = mimeType || "text/html";

        if (window.Blob && window.URL && URL.createObjectURL) {
          try {
            blob = new Blob([text], { type: mimeType + ";charset=utf-8" });

            if (window.navigator && navigator.msSaveBlob) {
              navigator.msSaveBlob(blob, fileName);
              return;
            }

            url = URL.createObjectURL(blob);
            a = document.createElement("a");
            a.href = url;

            if (typeof a.download !== "undefined") {
              a.download = fileName;
              try {
                document.body.appendChild(a);
              } catch (e) {}
              simulateClick(a);
              setTimeout(function () {
                try {
                  if (a.parentNode) {
                    a.parentNode.removeChild(a);
                  }
                } catch (e) {}
                try {
                  URL.revokeObjectURL(url);
                } catch (e) {}
              }, 500);
              return;
            } else {
              fallbackUrl = window.open(url, "_blank");
              if (!fallbackUrl) {
                window.location.href = url;
              }
              return;
            }
          } catch (e) {}
        }

        try {
          fallbackUrl = "data:" + mimeType + ";charset=utf-8," + encodeURIComponent(text);
          if (!window.open(fallbackUrl, "_blank")) {
            window.location.href = fallbackUrl;
          }
        } catch (e) {
          alert("Save is not supported in this browser.");
        }
      }

      function saveNote() {
        var name = window.prompt("File name:", "n0tes");
        var fileName;
        var htmlText;

        if (name === null) {
          return;
        }

        fileName = cleanFileName(name);
        htmlText = buildExportHtml(fileName.replace(/\.html$/i, ""));
        downloadTextFile(fileName, htmlText, "text/html");
      }

      function emailNote() {
        var to = window.prompt("Email to (optional):", "");
        var subject = window.prompt("Email subject:", "n0tes");
        var body;

        if (to === null || subject === null) {
          return;
        }

        body = getPlainText();

        window.location.href =
          "mailto:" + to +
          "?subject=" + encodeURIComponent(subject) +
          "&body=" + encodeURIComponent(body);
      }

      function getFullscreenElement() {
        return document.fullscreenElement ||
               document.webkitFullscreenElement ||
               document.mozFullScreenElement ||
               document.msFullscreenElement ||
               null;
      }

      function requestFull(el) {
        if (el.requestFullscreen) {
          el.requestFullscreen();
          return true;
        }
        if (el.webkitRequestFullscreen) {
          el.webkitRequestFullscreen();
          return true;
        }
        if (el.webkitRequestFullScreen) {
          el.webkitRequestFullScreen();
          return true;
        }
        if (el.mozRequestFullScreen) {
          el.mozRequestFullScreen();
          return true;
        }
        if (el.msRequestFullscreen) {
          el.msRequestFullscreen();
          return true;
        }
        return false;
      }

      function exitFull() {
        if (document.exitFullscreen) {
          document.exitFullscreen();
          return true;
        }
        if (document.webkitExitFullscreen) {
          document.webkitExitFullscreen();
          return true;
        }
        if (document.webkitCancelFullScreen) {
          document.webkitCancelFullScreen();
          return true;
        }
        if (document.mozCancelFullScreen) {
          document.mozCancelFullScreen();
          return true;
        }
        if (document.msExitFullscreen) {
          document.msExitFullscreen();
          return true;
        }
        return false;
      }

      function updateFullButton() {
        if (getFullscreenElement()) {
          addClass(fullBtn, "full-active");
        } else {
          removeClass(fullBtn, "full-active");
        }
      }

      function toggleFullscreen() {
        if (getFullscreenElement()) {
          exitFull();
        } else {
          requestFull(document.documentElement);
        }
        setTimeout(updateFullButton, 120);
      }

      function startAutosave() {
        if (autosaveTimer) {
          return;
        }

        autosaveTimer = setInterval(function () {
          if (isDirty) {
            storeContent();
          }
        }, 4000);
      }

      storageOK = testStorage();
      loadPrefs();
      loadContent();
      ensureStartContent();
      applyPrefs();
      updateFormatButtons();
      startAutosave();

      bind(boldBtn, "click", function (evt) {
        stopEvent(evt);
        runCommand("bold");
      });

      bind(italicBtn, "click", function (evt) {
        stopEvent(evt);
        runCommand("italic");
      });

      bind(underlineBtn, "click", function (evt) {
        stopEvent(evt);
        runCommand("underline");
      });

      bind(themeBtn, "click", function (evt) {
        stopEvent(evt);
        toggleTheme();
      });

      bind(fullBtn, "click", function (evt) {
        stopEvent(evt);
        toggleFullscreen();
      });

      bind(menuBtn, "click", function (evt) {
        stopEvent(evt);
        toggleMenu();
      });

      bind(fontSelect, "change", function () {
        prefs.font = this.value;
        applyPrefs();
        storePrefs();
        editor.focus();
      });

      bind(sizeSelect, "change", function () {
        prefs.size = this.value;
        applyPrefs();
        storePrefs();
        editor.focus();
      });

      bind(styleSelect, "change", function () {
        applyBlock(this.value);
        editor.focus();
      });

      bind(saveBtn, "click", function () {
        saveNote();
      });

      bind(emailBtn, "click", function () {
        emailNote();
      });

      bind(editor, "input", function () {
        saveSelectionRange();
        updateFormatButtons();
        markDirty();
      });

      bind(editor, "keyup", function () {
        saveSelectionRange();
        updateFormatButtons();
        markDirty();
      });

      bind(editor, "mouseup", function () {
        saveSelectionRange();
        updateFormatButtons();
      });

      bind(editor, "touchend", function () {
        saveSelectionRange();
        updateFormatButtons();
      });

      bind(editor, "focus", function () {
        saveSelectionRange();
        updateFormatButtons();
      });

      bind(editor, "blur", function () {
        saveSelectionRange();
      });

      bind(editor, "paste", function () {
        setTimeout(function () {
          saveSelectionRange();
          updateFormatButtons();
          markDirty();
        }, 0);
      });

      bind(document, "click", function (evt) {
        evt = evt || window.event;
        var target = evt.target || evt.srcElement;

        if (target !== menuBtn &&
            target !== menuPanel &&
            target !== fontSelect &&
            target !== sizeSelect &&
            target !== styleSelect &&
            target !== saveBtn &&
            target !== emailBtn) {
          menuPanel.style.display = "none";
          removeClass(menuBtn, "active");
        }
      });

      bind(document, "fullscreenchange", updateFullButton);
      bind(document, "webkitfullscreenchange", updateFullButton);
      bind(document, "mozfullscreenchange", updateFullButton);
      bind(document, "MSFullscreenChange", updateFullButton);

      bind(window, "beforeunload", function () {
        if (isDirty) {
          storeContent();
        }
        storePrefs();
      });

      editor.focus();
      saveSelectionRange();
    })();
  </script>
</body>
</html>
