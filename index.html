<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>n0tes</title>

  <style type="text/css">
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
    }

    body {
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
      font-family: Georgia, "Times New Roman", serif;
    }

    body.theme-dark {
      background: #0a0a0a;
      color: #f4f4f4;
    }

    body.theme-light {
      background: #f2f2ee;
      color: #111111;
    }

    #app {
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      left: 0;
      overflow: hidden;
    }

    #writerWrap {
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      left: 0;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    #editor {
      display: block;
      min-height: 100%;
      max-width: 760px;
      margin: 0 auto;
      padding: 18px 66px 72px 16px;
      box-sizing: border-box;
      outline: none;
      word-wrap: break-word;
      white-space: pre-wrap;
      font-size: 16px;
      line-height: 1.52;
      font-family: Georgia, "Times New Roman", serif;
    }

    #editor p,
    #editor div {
      margin: 0 0 0.85em 0;
    }

    #editor h1 {
      margin: 0 0 0.7em 0;
      font-size: 1.5em;
      line-height: 1.12;
      font-weight: bold;
    }

    #editor h2 {
      margin: 0 0 0.8em 0;
      font-size: 1.22em;
      line-height: 1.18;
      font-weight: bold;
    }

    #editor blockquote {
      margin: 0 0 0.85em 0;
      padding-left: 12px;
    }

    body.theme-dark #editor blockquote {
      border-left: 2px solid #5c5c5c;
      color: #d8d8d8;
    }

    body.theme-light #editor blockquote {
      border-left: 2px solid #96968d;
      color: #333333;
    }

    #toolbar {
      position: absolute;
      top: 12px;
      right: 10px;
      z-index: 30;
      width: 36px;
    }

    .toolbtn {
      display: block;
      width: 32px;
      height: 32px;
      margin: 0 0 8px 0;
      padding: 0;
      border-radius: 16px;
      font-size: 12px;
      line-height: 30px;
      text-align: center;
      cursor: pointer;
      outline: none;
      box-sizing: border-box;
      -webkit-appearance: none;
      appearance: none;
      background: #ffffff;
      color: #111111;
      border: 1px solid #ffffff;
      font-family: Arial, Helvetica, sans-serif;
      font-weight: normal;
    }

    body.theme-light .toolbtn {
      background: #111111;
      color: #ffffff;
      border: 1px solid #111111;
    }

    .toolbtn.active {
      box-shadow: 0 0 0 2px rgba(140,140,140,0.35);
    }

    #menuPanel {
      display: none;
      position: absolute;
      top: 12px;
      right: 52px;
      z-index: 29;
      width: 156px;
      padding: 8px;
      border-radius: 12px;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body.theme-dark #menuPanel {
      background: #121212;
      color: #f4f4f4;
      border: 1px solid #2e2e2e;
    }

    body.theme-light #menuPanel {
      background: #fbfbf8;
      color: #111111;
      border: 1px solid #ccccbf;
    }

    .panelRow {
      margin: 0 0 8px 0;
    }

    .panelLabel {
      display: block;
      margin: 0 0 4px 0;
      font-size: 10px;
      line-height: 1.2;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .panelSelect,
    .panelBtn {
      display: block;
      width: 100%;
      height: 30px;
      padding: 0 8px;
      border-radius: 8px;
      box-sizing: border-box;
      outline: none;
      font-size: 12px;
      -webkit-appearance: none;
      appearance: none;
      font-family: Arial, Helvetica, sans-serif;
    }

    body.theme-dark .panelSelect,
    body.theme-dark .panelBtn {
      background: #ffffff;
      color: #111111;
      border: 1px solid #ffffff;
    }

    body.theme-light .panelSelect,
    body.theme-light .panelBtn {
      background: #111111;
      color: #ffffff;
      border: 1px solid #111111;
    }

    #status {
      position: absolute;
      left: 12px;
      bottom: 10px;
      z-index: 20;
      font-size: 10px;
      line-height: 1.2;
      font-family: Arial, Helvetica, sans-serif;
      opacity: 0.72;
    }

    @media screen and (max-width: 700px) {
      #toolbar {
        top: 8px;
        right: 8px;
        width: 32px;
      }

      .toolbtn {
        width: 30px;
        height: 30px;
        line-height: 28px;
        margin-bottom: 6px;
        font-size: 11px;
      }

      #menuPanel {
        top: 8px;
        right: 42px;
        width: 140px;
        padding: 7px;
      }

      #editor {
        padding: 14px 52px 58px 12px;
        font-size: 15px;
        line-height: 1.46;
      }

      .panelSelect,
      .panelBtn {
        height: 28px;
        font-size: 11px;
      }

      #status {
        left: 10px;
        bottom: 8px;
      }
    }

    @media screen and (orientation: landscape) and (max-height: 500px) {
      #editor {
        font-size: 15px;
        line-height: 1.42;
        padding-top: 12px;
        padding-bottom: 46px;
      }

      .toolbtn {
        margin-bottom: 5px;
      }
    }
  </style>
</head>
<body class="theme-dark">
  <div id="app">
    <div id="writerWrap">
      <div id="editor" contenteditable="true"></div>
    </div>

    <div id="toolbar">
      <button type="button" class="toolbtn" id="boldBtn" title="Bold"><b>B</b></button>
      <button type="button" class="toolbtn" id="italicBtn" title="Italic"><i>I</i></button>
      <button type="button" class="toolbtn" id="underlineBtn" title="Underline"><u>U</u></button>
      <button type="button" class="toolbtn" id="themeBtn" title="Theme">&#9728;</button>
      <button type="button" class="toolbtn" id="fullBtn" title="Full screen">FS</button>
      <button type="button" class="toolbtn" id="menuBtn" title="More">&#9776;</button>
    </div>

    <div id="menuPanel">
      <div class="panelRow">
        <label class="panelLabel" for="fontSelect">Font</label>
        <select class="panelSelect" id="fontSelect">
          <option value="serif">Georgia</option>
          <option value="sans">Arial</option>
          <option value="mono">Courier</option>
        </select>
      </div>

      <div class="panelRow">
        <label class="panelLabel" for="sizeSelect">Text size</label>
        <select class="panelSelect" id="sizeSelect">
          <option value="14">14 px</option>
          <option value="15">15 px</option>

  <script type="text/javascript">
    (function () {
      var editor = document.getElementById("editor");
      var boldBtn = document.getElementById("boldBtn");
      var italicBtn = document.getElementById("italicBtn");
      var underlineBtn = document.getElementById("underlineBtn");
      var themeBtn = document.getElementById("themeBtn");
      var fullBtn = document.getElementById("fullBtn");
      var menuBtn = document.getElementById("menuBtn");
      var menuPanel = document.getElementById("menuPanel");
      var fontSelect = document.getElementById("fontSelect");
      var sizeSelect = document.getElementById("sizeSelect");
      var styleSelect = document.getElementById("styleSelect");
      var soundBtn = document.getElementById("soundBtn");
      var saveBtn = document.getElementById("saveBtn");
      var emailBtn = document.getElementById("emailBtn");

      var contentKey = "n0tes_content_v4";
      var prefsKey = "n0tes_prefs_v4";
      var storageOK = false;
      var savedRange = null;
      var lastKeydownAt = 0;
      var lastSoftInputSoundAt = 0;

      var soundPool = [];
      var soundIndex = 0;
      var soundSrc = null;

      var prefs = {
        font: "serif",
        size: "16",
        theme: "dark",
        sound: "off"
      };

      var fontMap = {
        serif: 'Georgia, "Times New Roman", serif',
        sans: 'Arial, Helvetica, sans-serif',
        mono: '"Courier New", Courier, monospace'
      };

      function bind(el, eventName, handler) {
        if (el.addEventListener) {
          el.addEventListener(eventName, handler, false);
        } else if (el.attachEvent) {
          el.attachEvent("on" + eventName, handler);
        } else {
          el["on" + eventName] = handler;
        }
      }

      function hasClass(el, className) {
        return new RegExp("(^|\\s)" + className + "(\\s|$)").test(el.className);
      }

      function addClass(el, className) {
        if (!hasClass(el, className)) {
          el.className = el.className ? el.className + " " + className : className;
        }
      }

      function removeClass(el, className) {
        var reg = new RegExp("(^|\\s)" + className + "(\\s|$)", "g");
        el.className = el.className.replace(reg, " ").replace(/\s+/g, " ").replace(/^\s+|\s+$/g, "");
      }

      function stopEvent(evt) {
        evt = evt || window.event;
        if (evt.stopPropagation) {
          evt.stopPropagation();
        }
        evt.cancelBubble = true;
      }

      function testStorage() {
        try {
          var x = "__n0tes_test__";
          window.localStorage.setItem(x, x);
          window.localStorage.removeItem(x);
          return true;
        } catch (e) {
          return false;
        }
      }

      function saveSelectionRange() {
        try {
          if (window.getSelection) {
            var sel = window.getSelection();
            if (sel && sel.rangeCount > 0) {
              savedRange = sel.getRangeAt(0);
            }
          } else if (document.selection) {
            savedRange = document.selection.createRange();
          }
        } catch (e) {}
      }

      function restoreSelectionRange() {
        try {
          if (!savedRange) {
            return;
          }

          if (window.getSelection) {
            var sel = window.getSelection();
            sel.removeAllRanges();
            sel.addRange(savedRange);
          } else if (document.selection && savedRange.select) {
            savedRange.select();
          }
        } catch (e) {}
      }

      function ensureStartContent() {
        var html = editor.innerHTML;
        if (!html || html.replace(/[\s\u00A0]/g, "").replace(/<br>/gi, "") === "") {
          editor.innerHTML = "<div><br></div>";
        }
      }

      function storeContent() {
        if (!storageOK) {
          return;
        }
        try {
          window.localStorage.setItem(contentKey, editor.innerHTML);
        } catch (e) {}
      }

      function loadContent() {
        if (!storageOK) {
          return;
        }
        try {
          var saved = window.localStorage.getItem(contentKey);
          if (saved && saved !== "") {
            editor.innerHTML = saved;
          }
        } catch (e) {}
      }

      function storePrefs() {
        if (!storageOK) {
          return;
        }
        try {
          window.localStorage.setItem(
            prefsKey,
            prefs.font + "|" + prefs.size + "|" + prefs.theme + "|" + prefs.sound
          );
        } catch (e) {}
      }

      function loadPrefs() {
        if (!storageOK) {
          return;
        }
        try {
          var saved = window.localStorage.getItem(prefsKey);
          var parts;
          if (!saved) {
            return;
          }
          parts = saved.split("|");
          if (parts[0]) { prefs.font = parts[0]; }
          if (parts[1]) { prefs.size = parts[1]; }
          if (parts[2]) { prefs.theme = parts[2]; }
          if (parts[3]) { prefs.sound = parts[3]; }
        } catch (e) {}
      }

      function applyPrefs() {
        editor.style.fontFamily = fontMap[prefs.font] || fontMap.serif;
        editor.style.fontSize = prefs.size + "px";

        if (prefs.theme === "light") {
          document.body.className = "theme-light";
        } else {
          document.body.className = "theme-dark";
        }

        fontSelect.value = prefs.font;
        sizeSelect.value = prefs.size;

        if (prefs.sound === "on") {
          soundBtn.innerHTML = "Sound on";
        } else {
          soundBtn.innerHTML = "Sound off";
        }

        updateFullButton();
      }

      function runCommand(command, value) {
        editor.focus();
        restoreSelectionRange();

        try {
          document.execCommand("styleWithCSS", false, false);
        } catch (e) {}

        try {
          document.execCommand(command, false, value || null);
        } catch (e) {}

        saveSelectionRange();
        updateFormatButtons();
        storeContent();
      }

      function applyBlock(tagName) {
        editor.focus();
        restoreSelectionRange();

        try {
          document.execCommand("formatBlock", false, "<" + tagName + ">");
        } catch (e) {}

        try {
          document.execCommand("formatBlock", false, tagName);
        } catch (e) {}

        saveSelectionRange();
        storeContent();
      }

      function setCommandState(button, command) {
        var state = false;
        try {
          state = document.queryCommandState(command);
        } catch (e) {
          state = false;
        }

        if (state) {
          addClass(button, "active");
        } else {
          removeClass(button, "active");
        }
      }

      function updateFormatButtons() {
        setCommandState(boldBtn, "bold");
        setCommandState(italicBtn, "italic");
        setCommandState(underlineBtn, "underline");
      }

      function toggleMenu() {
        if (menuPanel.style.display === "block") {
          menuPanel.style.display = "none";
          removeClass(menuBtn, "active");
        } else {
          menuPanel.style.display = "block";
          addClass(menuBtn, "active");
        }
      }

      function toggleTheme() {
        prefs.theme = prefs.theme === "light" ? "dark" : "light";
        applyPrefs();
        storePrefs();
        editor.focus();
      }

      function getPlainText() {
        if (typeof editor.innerText !== "undefined") {
          return editor.innerText;
        }
        if (typeof editor.textContent !== "undefined") {
          return editor.textContent;
        }
        return "";
      }

      function escapeHtml(text) {
        return String(text)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function cleanFileName(name) {
        var value = name || "n0tes";
        value = value.replace(/[\\\/:\*\?\"<>\|]+/g, "_");
        value = value.replace(/^\s+|\s+$/g, "");
        if (!value) {
          value = "n0tes";
        }
        if (value.toLowerCase().indexOf(".html") === -1) {
          value += ".html";
        }
        return value;
      }

      function buildExportHtml(title) {
        var bg = prefs.theme === "light" ? "#f2f2ee" : "#0a0a0a";
        var fg = prefs.theme === "light" ? "#111111" : "#f4f4f4";
        var quoteBorder = prefs.theme === "light" ? "#96968d" : "#5c5c5c";
        var quoteColor = prefs.theme === "light" ? "#333333" : "#d8d8d8";
        var fontCss = fontMap[prefs.font] || fontMap.serif;
        var parts = [];

        parts.push("<!DOCTYPE html>");
        parts.push("<html>");
        parts.push("<head>");
        parts.push("<meta charset=\"utf-8\">");
        parts.push("<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">");
        parts.push("<title>" + escapeHtml(title) + "</title>");
        parts.push("<style type=\"text/css\">");
        parts.push("html,body{margin:0;padding:0;background:" + bg + ";color:" + fg + ";}");
        parts.push("body{font-family:" + fontCss + ";}");
        parts.push("#note{max-width:760px;margin:0 auto;padding:18px 16px 40px 16px;font-size:" + prefs.size + "px;line-height:1.52;word-wrap:break-word;white-space:normal;}");
        parts.push("#note p,#note div{margin:0 0 0.85em 0;}");
        parts.push("#note h1{margin:0 0 0.7em 0;font-size:1.5em;line-height:1.12;font-weight:bold;}");
        parts.push("#note h2{margin:0 0 0.8em 0;font-size:1.22em;line-height:1.18;font-weight:bold;}");
        parts.push("#note blockquote{margin:0 0 0.85em 0;padding-left:12px;border-left:2px solid " + quoteBorder + ";color:" + quoteColor + ";}");
        parts.push("</style>");
        parts.push("</head>");
        parts.push("<body>");
        parts.push("<div id=\"note\">");
        parts.push(editor.innerHTML);
        parts.push("</div>");
        parts.push("</body>");
        parts.push("</html>");

        return parts.join("");
      }

      function simulateClick(el) {
        try {
          if (el.click) {
            el.click();
            return;
          }
        } catch (e) {}

        try {
          var evt = document.createEvent("MouseEvents");
          evt.initMouseEvent("click", true, true, window, 1, 0, 0, 0, 0, false, false, false, false, 0, null);
          el.dispatchEvent(evt);
        } catch (e) {}
      }

      function downloadTextFile(fileName, text, mimeType) {
        var blob, url, a, fallbackUrl;

        mimeType = mimeType || "text/html";

        if (window.Blob && window.URL && URL.createObjectURL) {
          try {
            blob = new Blob([text], { type: mimeType + ";charset=utf-8" });

            if (window.navigator && navigator.msSaveBlob) {
              navigator.msSaveBlob(blob, fileName);
              return;
            }

            url = URL.createObjectURL(blob);
            a = document.createElement("a");
            a.href = url;

            if (typeof a.download !== "undefined") {
              a.download = fileName;
              try {
                document.body.appendChild(a);
              } catch (e) {}
              simulateClick(a);
              setTimeout(function () {
                try {
                  if (a.parentNode) {
                    a.parentNode.removeChild(a);
                  }
                } catch (e) {}
                try {
                  URL.revokeObjectURL(url);
                } catch (e) {}
              }, 500);
              return;
            } else {
              fallbackUrl = window.open(url, "_blank");
              if (!fallbackUrl) {
                window.location.href = url;
              }
              return;
            }
          } catch (e) {}
        }

        try {
          fallbackUrl = "data:" + mimeType + ";charset=utf-8," + encodeURIComponent(text);
          if (!window.open(fallbackUrl, "_blank")) {
            window.location.href = fallbackUrl;
          }
        } catch (e) {
          alert("Save is not supported in this browser.");
        }
      }

      function saveNote() {
        var name = window.prompt("File name:", "n0tes");
        var fileName;
        var htmlText;

        if (name === null) {
          return;
        }

        fileName = cleanFileName(name);
        htmlText = buildExportHtml(fileName.replace(/\.html$/i, ""));
        downloadTextFile(fileName, htmlText, "text/html");
      }

      function emailNote() {
        var to = window.prompt("Email to (optional):", "");
        var subject = window.prompt("Email subject:", "n0tes");
        var body;

        if (to === null || subject === null) {
          return;
        }

        body = getPlainText();

        window.location.href =
          "mailto:" + to +
          "?subject=" + encodeURIComponent(subject) +
          "&body=" + encodeURIComponent(body);
      }

      function base64Encode(input) {
        var chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/";
        var str = input;
        var output = "";
        var i = 0;
        var chr1, chr2, chr3, enc1, enc2, enc3, enc4;

        while (i < str.length) {
          chr1 = str.charCodeAt(i++);
          chr2 = str.charCodeAt(i++);
          chr3 = str.charCodeAt(i++);

          enc1 = chr1 >> 2;
          enc2 = ((chr1 & 3) << 4) | (chr2 >> 4);
          enc3 = ((chr2 & 15) << 2) | (chr3 >> 6);
          enc4 = chr3 & 63;

          if (isNaN(chr2)) {
            enc3 = 64;
            enc4 = 64;
          } else if (isNaN(chr3)) {
            enc4 = 64;
          }

          output = output +
            chars.charAt(enc1) +
            chars.charAt(enc2) +
            (enc3 === 64 ? "=" : chars.charAt(enc3)) +
            (enc4 === 64 ? "=" : chars.charAt(enc4));
        }

        return output;
      }

      function clampByte(n) {
        if (n < 0) { return 0; }
        if (n > 255) { return 255; }
        return n;
      }

      function push16(arr, value) {
        arr[arr.length] = value & 255;
        arr[arr.length] = (value >> 8) & 255;
      }

      function push32(arr, value) {
        arr[arr.length] = value & 255;
        arr[arr.length] = (value >> 8) & 255;
        arr[arr.length] = (value >> 16) & 255;
        arr[arr.length] = (value >> 24) & 255;
      }

      function bytesToString(arr) {
        var out = "";
        var i;
        for (i = 0; i < arr.length; i++) {
          out += String.fromCharCode(arr[i]);
        }
        return out;
      }

      function buildClickWavDataUri() {
        var sampleRate = 8000;
        var sampleCount = 88;
        var dataBytes = [];
        var bytes = [];
        var i, amp, val, sign, noise, seed;

        seed = 17;

        for (i = 0; i < sampleCount; i++) {
          amp = (sampleCount - i) / sampleCount;
          sign = (i % 2 === 0) ? 1 : -1;
          seed = (seed * 1103515245 + 12345) & 2147483647;
          noise = ((seed >> 16) & 31) - 15;
          val = 128 + (sign * 70 * amp) + (noise * amp);
          dataBytes[dataBytes.length] = clampByte(parseInt(val, 10));
        }

        bytes[bytes.length] = 82;  /* R */
        bytes[bytes.length] = 73;  /* I */
        bytes[bytes.length] = 70;  /* F */
        bytes[bytes.length] = 70;  /* F */
        push32(bytes, 36 + dataBytes.length);
        bytes[bytes.length] = 87;  /* W */
        bytes[bytes.length] = 65;  /* A */
        bytes[bytes.length] = 86;  /* V */
        bytes[bytes.length] = 69;  /* E */

        bytes[bytes.length] = 102; /* f */
        bytes[bytes.length] = 109; /* m */
        bytes[bytes.length] = 116; /* t */
        bytes[bytes.length] = 32;  /* space */
        push32(bytes, 16);
        push16(bytes, 1);
        push16(bytes, 1);
        push32(bytes, sampleRate);
        push32(bytes, sampleRate * 1 * 8 / 8);
        push16(bytes, 1 * 8 / 8);
        push16(bytes, 8);

        bytes[bytes.length] = 100; /* d */
        bytes[bytes.length] = 97;  /* a */
        bytes[bytes.length] = 116; /* t */
        bytes[bytes.length] = 97;  /* a */
        push32(bytes, dataBytes.length);

        for (i = 0; i < dataBytes.length; i++) {
          bytes[bytes.length] = dataBytes[i];
        }

        return "data:audio/wav;base64," + base64Encode(bytesToString(bytes));
      }

      function initSoundPool() {
        var i, a;

        if (soundPool.length > 0) {
          return true;
        }

        if (!window.Audio) {
          return false;
        }

        if (!soundSrc) {
          soundSrc = buildClickWavDataUri();
        }

        try {
          for (i = 0; i < 10; i++) {
            a = new Audio();
            a.preload = "auto";
            a.src = soundSrc;
            a.volume = 0.25;
            if (a.load) {
              try { a.load(); } catch (e) {}
            }
            soundPool[soundPool.length] = a;
          }
          return true;
        } catch (e) {
          soundPool = [];
          return false;
        }
      }

      function playClick() {
        var a;
        var result;

        if (prefs.sound !== "on") {
          return;
        }

        if (!soundPool.length) {
          if (!initSoundPool()) {
            return;
          }
        }

        a = soundPool[soundIndex];
        soundIndex++;
        if (soundIndex >= soundPool.length) {
          soundIndex = 0;
        }

        if (!a) {
          return;
        }

        try {
          if (a.pause) {
            a.pause();
          }
        } catch (e) {}

        try {
          a.currentTime = 0;
        } catch (e) {}

        try {
          result = a.play();
          if (result && result.then) {
            result.then(function () {}).catch(function () {});
          }
        } catch (e) {}
      }

      function toggleSound() {
        if (prefs.sound === "on") {
          prefs.sound = "off";
        } else {
          prefs.sound = "on";
          initSoundPool();
          playClick();
        }
        applyPrefs();
        storePrefs();
        editor.focus();
      }

      function isTypingKey(evt) {
        var code = evt.which || evt.keyCode;

        if (code === 8 || code === 13 || code === 32 || code === 46) {
          return true;
        }
        if (code >= 48 && code <= 90) {
          return true;
        }
        if (code >= 96 && code <= 111) {
          return true;
        }
        if (code >= 186 && code <= 222) {
          return true;
        }
        return false;
      }

      function getFullscreenElement() {
        return document.fullscreenElement ||
               document.webkitFullscreenElement ||
               document.mozFullScreenElement ||
               document.msFullscreenElement ||
               null;
      }

      function requestFull(el) {
        if (el.requestFullscreen) {
          el.requestFullscreen();
          return true;
        }
        if (el.webkitRequestFullscreen) {
          el.webkitRequestFullscreen();
          return true;
        }
        if (el.webkitRequestFullScreen) {
          el.webkitRequestFullScreen();
          return true;
        }
        if (el.mozRequestFullScreen) {
          el.mozRequestFullScreen();
          return true;
        }
        if (el.msRequestFullscreen) {
          el.msRequestFullscreen();
          return true;
        }
        return false;
      }

      function exitFull() {
        if (document.exitFullscreen) {
          document.exitFullscreen();
          return true;
        }
        if (document.webkitExitFullscreen) {
          document.webkitExitFullscreen();
          return true;
        }
        if (document.webkitCancelFullScreen) {
          document.webkitCancelFullScreen();
          return true;
        }
        if (document.mozCancelFullScreen) {
          document.mozCancelFullScreen();
          return true;
        }
        if (document.msExitFullscreen) {
          document.msExitFullscreen();
          return true;
        }
        return false;
      }

      function updateFullButton() {
        if (getFullscreenElement()) {
          addClass(fullBtn, "active");
        } else {
          removeClass(fullBtn, "active");
        }
      }

      function toggleFullscreen() {
        if (getFullscreenElement()) {
          exitFull();
        } else {
          requestFull(document.documentElement);
        }
        setTimeout(updateFullButton, 120);
      }

      storageOK = testStorage();
      loadPrefs();
      loadContent();
      ensureStartContent();
      applyPrefs();
      updateFormatButtons();

      bind(boldBtn, "click", function (evt) {
        stopEvent(evt);
        runCommand("bold");
      });

      bind(italicBtn, "click", function (evt) {
        stopEvent(evt);
        runCommand("italic");
      });

      bind(underlineBtn, "click", function (evt) {
        stopEvent(evt);
        runCommand("underline");
      });

      bind(themeBtn, "click", function (evt) {
        stopEvent(evt);
        toggleTheme();
      });

      bind(fullBtn, "click", function (evt) {
        stopEvent(evt);
        toggleFullscreen();
      });

      bind(menuBtn, "click", function (evt) {
        stopEvent(evt);
        toggleMenu();
      });

      bind(fontSelect, "change", function () {
        prefs.font = this.value;
        applyPrefs();
        storePrefs();
        editor.focus();
      });

      bind(sizeSelect, "change", function () {
        prefs.size = this.value;
        applyPrefs();
        storePrefs();
        editor.focus();
      });

      bind(styleSelect, "change", function () {
        applyBlock(this.value);
        editor.focus();
      });

      bind(soundBtn, "click", function () {
        toggleSound();
      });

      bind(saveBtn, "click", function () {
        saveNote();
      });

      bind(emailBtn, "click", function () {
        emailNote();
      });

      bind(editor, "keydown", function (evt) {
        lastKeydownAt = new Date().getTime();
        if (isTypingKey(evt || window.event)) {
          playClick();
        }
      });

      bind(editor, "input", function () {
        var now = new Date().getTime();
        if (now - lastKeydownAt > 60 && now - lastSoftInputSoundAt > 30) {
          playClick();
          lastSoftInputSoundAt = now;
        }
        saveSelectionRange();
        updateFormatButtons();
        storeContent();
      });

      bind(editor, "keyup", function () {
        saveSelectionRange();
        updateFormatButtons();
        storeContent();
      });

      bind(editor, "mouseup", function () {
        saveSelectionRange();
        updateFormatButtons();
      });

      bind(editor, "touchend", function () {
        saveSelectionRange();
        updateFormatButtons();
      });

      bind(editor, "focus", function () {
        saveSelectionRange();
        updateFormatButtons();
      });

      bind(editor, "blur", function () {
        saveSelectionRange();
      });

      bind(editor, "paste", function () {
        setTimeout(function () {
          saveSelectionRange();
          updateFormatButtons();
          storeContent();
        }, 0);
      });

      bind(document, "click", function (evt) {
        evt = evt || window.event;
        var target = evt.target || evt.srcElement;

        if (target !== menuBtn &&
            target !== menuPanel &&
            target !== fontSelect &&
            target !== sizeSelect &&
            target !== styleSelect &&
            target !== soundBtn &&
            target !== saveBtn &&
            target !== emailBtn) {
          menuPanel.style.display = "none";
          removeClass(menuBtn, "active");
        }
      });

      bind(document, "fullscreenchange", updateFullButton);
      bind(document, "webkitfullscreenchange", updateFullButton);
      bind(document, "mozfullscreenchange", updateFullButton);
      bind(document, "MSFullscreenChange", updateFullButton);

      bind(window, "beforeunload", function () {
        storeContent();
        storePrefs();
      });

      editor.focus();
      saveSelectionRange();
    })();
  </script>
</body>
</html>
