<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Quiet Writer</title>
  <style type="text/css">
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
    }

    body {
      font-family: Georgia, "Times New Roman", serif;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    body.theme-dark {
      background: #090b12;
      color: #f4f4f4;
    }

    body.theme-light {
      background: #f1f1ed;
      color: #111111;
    }

    #app {
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      left: 0;
      overflow: hidden;
    }

    #writerWrap {
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      left: 0;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    #editor {
      display: block;
      min-height: 100%;
      max-width: 760px;
      margin: 0 auto;
      padding: 22px 64px 80px 18px;
      outline: none;
      word-wrap: break-word;
      white-space: pre-wrap;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 18px;
      line-height: 1.55;
      box-sizing: border-box;
    }

    #editor p,
    #editor div {
      margin: 0 0 0.9em 0;
    }

    #editor h1 {
      margin: 0 0 0.7em 0;
      font-size: 1.55em;
      line-height: 1.15;
      font-weight: bold;
    }

    #editor h2 {
      margin: 0 0 0.8em 0;
      font-size: 1.22em;
      line-height: 1.2;
      font-weight: bold;
    }

    #editor blockquote {
      margin: 0 0 0.9em 0;
      padding-left: 12px;
    }

    body.theme-dark #editor blockquote {
      border-left: 2px solid #5c6173;
      color: #d9d9df;
    }

    body.theme-light #editor blockquote {
      border-left: 2px solid #8f8f88;
      color: #333333;
    }

    #toolbar {
      position: absolute;
      top: 14px;
      right: 10px;
      z-index: 30;
      width: 36px;
    }

    .toolbtn {
      display: block;
      width: 32px;
      height: 32px;
      margin: 0 0 8px 0;
      padding: 0;
      border-radius: 16px;
      font-size: 13px;
      line-height: 30px;
      text-align: center;
      cursor: pointer;
      -webkit-appearance: none;
      appearance: none;
      outline: none;
      box-sizing: border-box;
      background: #ffffff;
      color: #111111;
      border: 1px solid #ffffff;
    }

    body.theme-light .toolbtn {
      background: #111111;
      color: #ffffff;
      border: 1px solid #111111;
    }

    .toolbtn.active {
      box-shadow: 0 0 0 2px rgba(127,127,127,0.4);
    }

    #menuPanel {
      display: none;
      position: absolute;
      top: 14px;
      right: 52px;
      z-index: 29;
      width: 156px;
      padding: 8px;
      border-radius: 12px;
      box-sizing: border-box;
    }

    body.theme-dark #menuPanel {
      background: #111420;
      color: #f4f4f4;
      border: 1px solid #2c3142;
    }

    body.theme-light #menuPanel {
      background: #fafaf7;
      color: #111111;
      border: 1px solid #cbcbc4;
    }

    .panelRow {
      margin: 0 0 8px 0;
    }

    .panelLabel {
      display: block;
      margin: 0 0 4px 0;
      font-size: 10px;
      line-height: 1.2;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-family: Arial, Helvetica, sans-serif;
    }

    .panelSelect,
    .panelBtn {
      display: block;
      width: 100%;
      height: 30px;
      padding: 0 8px;
      border-radius: 8px;
      box-sizing: border-box;
      outline: none;
      -webkit-appearance: none;
      appearance: none;
      font-size: 12px;
      font-family: Arial, Helvetica, sans-serif;
    }

    body.theme-dark .panelSelect,
    body.theme-dark .panelBtn {
      background: #ffffff;
      color: #111111;
      border: 1px solid #ffffff;
    }

    body.theme-light .panelSelect,
    body.theme-light .panelBtn {
      background: #111111;
      color: #ffffff;
      border: 1px solid #111111;
    }

    #status {
      position: absolute;
      left: 14px;
      bottom: 10px;
      z-index: 20;
      font-size: 10px;
      line-height: 1.2;
      font-family: Arial, Helvetica, sans-serif;
      opacity: 0.75;
    }

    @media screen and (max-width: 700px) {
      #toolbar {
        top: 10px;
        right: 8px;
        width: 32px;
      }

      .toolbtn {
        width: 30px;
        height: 30px;
        line-height: 28px;
        margin-bottom: 6px;
        font-size: 12px;
      }

      #menuPanel {
        top: 10px;
        right: 44px;
        width: 138px;
        padding: 7px;
      }

      #editor {
        padding: 16px 52px 68px 14px;
        font-size: 17px;
        line-height: 1.5;
      }

      .panelSelect,
      .panelBtn {
        height: 28px;
        font-size: 11px;
      }

      #status {
        left: 10px;
        bottom: 8px;
      }
    }

    @media screen and (orientation: landscape) and (max-height: 500px) {
      #editor {
        font-size: 16px;
        line-height: 1.45;
        padding-top: 14px;
        padding-bottom: 50px;
      }

      .toolbtn {
        margin-bottom: 5px;
      }
    }
  </style>
</head>
<body class="theme-dark">
  <div id="app">
    <div id="writerWrap">
      <div id="editor" contenteditable="true"></div>
    </div>

    <div id="toolbar">
      <button type="button" class="toolbtn" id="boldBtn" title="Bold"><b>B</b></button>
      <button type="button" class="toolbtn" id="italicBtn" title="Italic"><i>I</i></button>
      <button type="button" class="toolbtn" id="underlineBtn" title="Underline"><u>U</u></button>
      <button type="button" class="toolbtn" id="themeBtn" title="Theme">T</button>
      <button type="button" class="toolbtn" id="menuBtn" title="More">+</button>
    </div>

    <div id="menuPanel">
      <div class="panelRow">
        <label class="panelLabel" for="fontSelect">Font</label>
        <select class="panelSelect" id="fontSelect">
          <option value="serif">Georgia</option>
          <option value="sans">Arial</option>
          <option value="mono">Courier</option>
        </select>
      </div>

      <div class="panelRow">
        <label class="panelLabel" for="sizeSelect">Text size</label>
        <select class="panelSelect" id="sizeSelect">
          <option value="15">15 px</option>
          <option value="16">16 px</option>
          <option value="17">17 px</option>
          <option value="18">18 px</option>
          <option value="20">20 px</option>
          <option value="22">22 px</option>
          <option value="24">24 px</option>
        </select>
      </div>

      <div class="panelRow">
        <label class="panelLabel" for="styleSelect">Paragraph style</label>
        <select class="panelSelect" id="styleSelect">
          <option value="P">Paragraph</option>
          <option value="H1">Heading 1</option>
          <option value="H2">Heading 2</option>
          <option value="BLOCKQUOTE">Quote</option>
        </select>
      </div>

      <div class="panelRow">
        <button type="button" class="panelBtn" id="soundBtn">Sound off</button>
      </div>

      <div class="panelRow">
        <button type="button" class="panelBtn" id="saveBtn">Save HTML</button>
      </div>

      <div class="panelRow">
        <button type="button" class="panelBtn" id="emailBtn">Email text</button>
      </div>
    </div>

    <div id="status">autosaves locally</div>
  </div>

  <script type="text/javascript">
    (function () {
      var editor = document.getElementById("editor");
      var boldBtn = document.getElementById("boldBtn");
      var italicBtn = document.getElementById("italicBtn");
      var underlineBtn = document.getElementById("underlineBtn");
      var themeBtn = document.getElementById("themeBtn");
      var menuBtn = document.getElementById("menuBtn");
      var menuPanel = document.getElementById("menuPanel");
      var fontSelect = document.getElementById("fontSelect");
      var sizeSelect = document.getElementById("sizeSelect");
      var styleSelect = document.getElementById("styleSelect");
      var soundBtn = document.getElementById("soundBtn");
      var saveBtn = document.getElementById("saveBtn");
      var emailBtn = document.getElementById("emailBtn");

      var contentKey = "quiet_writer_content_v3";
      var prefsKey = "quiet_writer_prefs_v3";
      var storageOK = false;
      var savedRange = null;
      var lastSoundAt = 0;
      var lastKeyTime = 0;

      var audioCtx = null;
      var clickBuffer = null;

      var prefs = {
        font: "serif",
        size: "18",
        theme: "dark",
        sound: "off"
      };

      var fontMap = {
        serif: 'Georgia, "Times New Roman", serif',
        sans: 'Arial, Helvetica, sans-serif',
        mono: '"Courier New", Courier, monospace'
      };

      function bind(el, eventName, handler) {
        if (el.addEventListener) {
          el.addEventListener(eventName, handler, false);
        } else if (el.attachEvent) {
          el.attachEvent("on" + eventName, handler);
        } else {
          el["on" + eventName] = handler;
        }
      }

      function hasClass(el, className) {
        return new RegExp("(^|\\s)" + className + "(\\s|$)").test(el.className);
      }

      function addClass(el, className) {
        if (!hasClass(el, className)) {
          el.className = el.className ? el.className + " " + className : className;
        }
      }

      function removeClass(el, className) {
        var reg = new RegExp("(^|\\s)" + className + "(\\s|$)", "g");
        el.className = el.className.replace(reg, " ").replace(/\s+/g, " ").replace(/^\s+|\s+$/g, "");
      }

      function testStorage() {
        try {
          var x = "__quiet_writer_test__";
          window.localStorage.setItem(x, x);
          window.localStorage.removeItem(x);
          return true;
        } catch (e) {
          return false;
        }
      }

      function saveSelectionRange() {
        try {
          if (window.getSelection) {
            var sel = window.getSelection();
            if (sel && sel.rangeCount > 0) {
              savedRange = sel.getRangeAt(0);
            }
          } else if (document.selection) {
            savedRange = document.selection.createRange();
          }
        } catch (e) {}
      }

      function restoreSelectionRange() {
        try {
          if (!savedRange) {
            return;
          }

          if (window.getSelection) {
            var sel = window.getSelection();
            sel.removeAllRanges();
            sel.addRange(savedRange);
          } else if (document.selection && savedRange.select) {
            savedRange.select();
          }
        } catch (e) {}
      }

      function ensureStartContent() {
        var html = editor.innerHTML;
        if (!html || html.replace(/[\s\u00A0]/g, "").replace(/<br>/gi, "") === "") {
          editor.innerHTML = "<div><br></div>";
        }
      }

      function storeContent() {
        if (!storageOK) {
          return;
        }
        try {
          window.localStorage.setItem(contentKey, editor.innerHTML);
        } catch (e) {}
      }

      function loadContent() {
        if (!storageOK) {
          return;
        }
        try {
          var saved = window.localStorage.getItem(contentKey);
          if (saved && saved !== "") {
            editor.innerHTML = saved;
          }
        } catch (e) {}
      }

      function storePrefs() {
        if (!storageOK) {
          return;
        }
        try {
          window.localStorage.setItem(
            prefsKey,
            prefs.font + "|" + prefs.size + "|" + prefs.theme + "|" + prefs.sound
          );
        } catch (e) {}
      }

      function loadPrefs() {
        if (!storageOK) {
          return;
        }
        try {
          var saved = window.localStorage.getItem(prefsKey);
          var parts;
          if (!saved) {
            return;
          }
          parts = saved.split("|");
          if (parts[0]) { prefs.font = parts[0]; }
          if (parts[1]) { prefs.size = parts[1]; }
          if (parts[2]) { prefs.theme = parts[2]; }
          if (parts[3]) { prefs.sound = parts[3]; }
        } catch (e) {}
      }

      function applyPrefs() {
        editor.style.fontFamily = fontMap[prefs.font] || fontMap.serif;
        editor.style.fontSize = prefs.size + "px";

        if (prefs.theme === "light") {
          document.body.className = "theme-light";
        } else {
          document.body.className = "theme-dark";
        }

        fontSelect.value = prefs.font;
        sizeSelect.value = prefs.size;

        if (prefs.sound === "on") {
          soundBtn.innerHTML = "Sound on";
        } else {
          soundBtn.innerHTML = "Sound off";
        }
      }

      function toggleMenu() {
        if (menuPanel.style.display === "block") {
          menuPanel.style.display = "none";
          removeClass(menuBtn, "active");
        } else {
          menuPanel.style.display = "block";
          addClass(menuBtn, "active");
        }
      }

      function runCommand(command, value) {
        editor.focus();
        restoreSelectionRange();

        try {
          document.execCommand("styleWithCSS", false, false);
        } catch (e) {}

        try {
          document.execCommand(command, false, value || null);
        } catch (e) {}

        saveSelectionRange();
        updateFormatButtons();
        storeContent();
      }

      function applyBlock(tagName) {
        editor.focus();
        restoreSelectionRange();

        try {
          document.execCommand("formatBlock", false, "<" + tagName + ">");
        } catch (e) {}

        try {
          document.execCommand("formatBlock", false, tagName);
        } catch (e) {}

        saveSelectionRange();
        storeContent();
      }

      function updateFormatButtons() {
        setCommandState(boldBtn, "bold");
        setCommandState(italicBtn, "italic");
        setCommandState(underlineBtn, "underline");
      }

      function setCommandState(button, command) {
        var state = false;
        try {
          state = document.queryCommandState(command);
        } catch (e) {
          state = false;
        }

        if (state) {
          addClass(button, "active");
        } else {
          removeClass(button, "active");
        }
      }

      function getPlainText() {
        if (typeof editor.innerText !== "undefined") {
          return editor.innerText;
        }
        if (typeof editor.textContent !== "undefined") {
          return editor.textContent;
        }
        return "";
      }

      function escapeHtml(text) {
        return String(text)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function cleanFileName(name) {
        var value = name || "note";
        value = value.replace(/[\\\/:\*\?\"<>\|]+/g, "_");
        value = value.replace(/^\s+|\s+$/g, "");
        if (!value) {
          value = "note";
        }
        if (value.toLowerCase().indexOf(".html") === -1) {
          value += ".html";
        }
        return value;
      }

      function buildExportHtml(title) {
        var bg = prefs.theme === "light" ? "#f1f1ed" : "#090b12";
        var fg = prefs.theme === "light" ? "#111111" : "#f4f4f4";
        var quoteBorder = prefs.theme === "light" ? "#8f8f88" : "#5c6173";
        var quoteColor = prefs.theme === "light" ? "#333333" : "#d9d9df";
        var fontCss = fontMap[prefs.font] || fontMap.serif;
        var parts = [];

        parts.push("<!DOCTYPE html>");
        parts.push("<html>");
        parts.push("<head>");
        parts.push("<meta charset=\"utf-8\">");
        parts.push("<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">");
        parts.push("<title>" + escapeHtml(title) + "</title>");
        parts.push("<style type=\"text/css\">");
        parts.push("html,body{margin:0;padding:0;background:" + bg + ";color:" + fg + ";}");
        parts.push("body{font-family:" + fontCss + ";}");
        parts.push("#note{max-width:760px;margin:0 auto;padding:22px 18px 40px 18px;font-size:" + prefs.size + "px;line-height:1.55;word-wrap:break-word;white-space:normal;}");
        parts.push("#note p,#note div{margin:0 0 0.9em 0;}");
        parts.push("#note h1{margin:0 0 0.7em 0;font-size:1.55em;line-height:1.15;font-weight:bold;}");
        parts.push("#note h2{margin:0 0 0.8em 0;font-size:1.22em;line-height:1.2;font-weight:bold;}");
        parts.push("#note blockquote{margin:0 0 0.9em 0;padding-left:12px;border-left:2px solid " + quoteBorder + ";color:" + quoteColor + ";}");
        parts.push("</style>");
        parts.push("</head>");
        parts.push("<body>");
        parts.push("<div id=\"note\">");
        parts.push(editor.innerHTML);
        parts.push("</div>");
        parts.push("</body>");
        parts.push("</html>");

        return parts.join("");
      }

      function simulateClick(el) {
        try {
          if (el.click) {
            el.click();
            return;
          }
        } catch (e) {}

        try {
          var evt = document.createEvent("MouseEvents");
          evt.initMouseEvent("click", true, true, window, 1, 0, 0, 0, 0, false, false, false, false, 0, null);
          el.dispatchEvent(evt);
        } catch (e) {}
      }

      function downloadTextFile(fileName, text, mimeType) {
        var blob, url, a, fallbackUrl;

        mimeType = mimeType || "text/html";

        if (window.Blob && window.URL && URL.createObjectURL) {
          try {
            blob = new Blob([text], { type: mimeType + ";charset=utf-8" });

            if (window.navigator && navigator.msSaveBlob) {
              navigator.msSaveBlob(blob, fileName);
              return;
            }

            url = URL.createObjectURL(blob);
            a = document.createElement("a");
            a.href = url;

            if (typeof a.download !== "undefined") {
              a.download = fileName;
              try {
                document.body.appendChild(a);
              } catch (e) {}
              simulateClick(a);
              setTimeout(function () {
                try {
                  if (a.parentNode) {
                    a.parentNode.removeChild(a);
                  }
                } catch (e) {}
                try {
                  URL.revokeObjectURL(url);
                } catch (e) {}
              }, 500);
              return;
            } else {
              fallbackUrl = window.open(url, "_blank");
              if (!fallbackUrl) {
                window.location.href = url;
              }
              return;
            }
          } catch (e) {}
        }

        try {
          fallbackUrl = "data:" + mimeType + ";charset=utf-8," + encodeURIComponent(text);
          if (!window.open(fallbackUrl, "_blank")) {
            window.location.href = fallbackUrl;
          }
        } catch (e) {
          alert("Save is not supported in this browser.");
        }
      }

      function saveNote() {
        var name = window.prompt("File name:", "note");
        var fileName;
        var htmlText;

        if (name === null) {
          return;
        }

        fileName = cleanFileName(name);
        htmlText = buildExportHtml(fileName.replace(/\.html$/i, ""));
        downloadTextFile(fileName, htmlText, "text/html");
      }

      function emailNote() {
        var to = window.prompt("Email to (optional):", "");
        var subject = window.prompt("Email subject:", "Note");
        var body;

        if (to === null || subject === null) {
          return;
        }

        body = getPlainText();

        window.location.href =
          "mailto:" + to +
          "?subject=" + encodeURIComponent(subject) +
          "&body=" + encodeURIComponent(body);
      }

      function getAudioCtor() {
        return window.AudioContext || window.webkitAudioContext || null;
      }

      function initAudio() {
        var Ctor = getAudioCtor();

        if (!Ctor) {
          return false;
        }

        try {
          if (!audioCtx) {
            audioCtx = new Ctor();
          }
          if (audioCtx.resume) {
            try {
              audioCtx.resume();
            } catch (e) {}
          }
          createClickBuffer();
          return true;
        } catch (e) {
          return false;
        }
      }

      function createClickBuffer() {
        var rate, length, data, i, decay, noise;

        if (!audioCtx || clickBuffer) {
          return;
        }

        try {
          rate = audioCtx.sampleRate || 22050;
          length = Math.floor(rate * 0.008);
          if (length < 32) {
            length = 32;
          }

          clickBuffer = audioCtx.createBuffer(1, length, rate);
          data = clickBuffer.getChannelData(0);

          for (i = 0; i < length; i++) {
            decay = 1 - (i / length);
            noise = (Math.random() * 2) - 1;
            data[i] = noise * decay * 0.18;
          }
        } catch (e) {
          clickBuffer = null;
        }
      }

      function playClick() {
        var now = new Date().getTime();
        var source, gain;

        if (prefs.sound !== "on") {
          return;
        }

        if (now - lastSoundAt < 28) {
          return;
        }

        lastSoundAt = now;

        if (!audioCtx && !initAudio()) {
          return;
        }

        if (audioCtx && audioCtx.resume) {
          try {
            audioCtx.resume();
          } catch (e) {}
        }

        if (!clickBuffer) {
          createClickBuffer();
        }

        if (!clickBuffer) {
          return;
        }

        try {
          source = audioCtx.createBufferSource();
          source.buffer = clickBuffer;

          if (audioCtx.createGain) {
            gain = audioCtx.createGain();
          } else if (audioCtx.createGainNode) {
            gain = audioCtx.createGainNode();
          }

          if (!gain) {
            return;
          }

          try {
            gain.gain.value = 0.55;
          } catch (e) {}

          source.connect(gain);
          gain.connect(audioCtx.destination);

          if (source.start) {
            source.start(0);
          } else if (source.noteOn) {
            source.noteOn(0);
          }

          setTimeout(function () {
            try {
              if (source.stop) {
                source.stop(0);
              } else if (source.noteOff) {
                source.noteOff(0);
              }
            } catch (e) {}
          }, 20);
        } catch (e) {}
      }

      function toggleSound() {
        if (prefs.sound === "on") {
          prefs.sound = "off";
        } else {
          prefs.sound = "on";
          initAudio();
          playClick();
        }
        applyPrefs();
        storePrefs();
        editor.focus();
      }

      function isTypingKey(evt) {
        var code = evt.which || evt.keyCode;

        if (code === 8 || code === 13 || code === 32 || code === 46) {
          return true;
        }
        if (code >= 48 && code <= 90) {
          return true;
        }
        if (code >= 96 && code <= 111) {
          return true;
        }
        if (code >= 186 && code <= 222) {
          return true;
        }
        return false;
      }

      function toggleTheme() {
        prefs.theme = prefs.theme === "light" ? "dark" : "light";
        applyPrefs();
        storePrefs();
        editor.focus();
      }

      function stopEvent(evt) {
        evt = evt || window.event;
        if (evt.stopPropagation) {
          evt.stopPropagation();
        }
        evt.cancelBubble = true;
      }

      storageOK = testStorage();
      loadPrefs();
      loadContent();
      ensureStartContent();
      applyPrefs();
      updateFormatButtons();

      bind(boldBtn, "click", function (evt) {
        stopEvent(evt);
        runCommand("bold");
      });

      bind(italicBtn, "click", function (evt) {
        stopEvent(evt);
        runCommand("italic");
      });

      bind(underlineBtn, "click", function (evt) {
        stopEvent(evt);
        runCommand("underline");
      });

      bind(themeBtn, "click", function (evt) {
        stopEvent(evt);
        toggleTheme();
      });

      bind(menuBtn, "click", function (evt) {
        stopEvent(evt);
        toggleMenu();
      });

      bind(fontSelect, "change", function () {
        prefs.font = this.value;
        applyPrefs();
        storePrefs();
        editor.focus();
      });

      bind(sizeSelect, "change", function () {
        prefs.size = this.value;
        applyPrefs();
        storePrefs();
        editor.focus();
      });

      bind(styleSelect, "change", function () {
        applyBlock(this.value);
        editor.focus();
      });

      bind(soundBtn, "click", function () {
        toggleSound();
      });

      bind(saveBtn, "click", function () {
        saveNote();
      });

      bind(emailBtn, "click", function () {
        emailNote();
      });

      bind(editor, "keydown", function (evt) {
        lastKeyTime = new Date().getTime();
        if (isTypingKey(evt || window.event)) {
          playClick();
        }
      });

      bind(editor, "keyup", function () {
        saveSelectionRange();
        updateFormatButtons();
        storeContent();
      });

      bind(editor, "input", function () {
        var now = new Date().getTime();
        if (now - lastKeyTime > 80) {
          playClick();
        }
        saveSelectionRange();
        updateFormatButtons();
        storeContent();
      });

      bind(editor, "mouseup", function () {
        saveSelectionRange();
        updateFormatButtons();
      });

      bind(editor, "touchend", function () {
        saveSelectionRange();
        updateFormatButtons();
      });

      bind(editor, "focus", function () {
        saveSelectionRange();
        updateFormatButtons();
      });

      bind(editor, "blur", function () {
        saveSelectionRange();
      });

      bind(editor, "paste", function () {
        setTimeout(function () {
          saveSelectionRange();
          updateFormatButtons();
          storeContent();
        }, 0);
      });

      bind(document, "click", function (evt) {
        evt = evt || window.event;
        var target = evt.target || evt.srcElement;

        if (target !== menuBtn && target !== menuPanel &&
            target !== fontSelect && target !== sizeSelect &&
            target !== styleSelect && target !== soundBtn &&
            target !== saveBtn && target !== emailBtn) {
          menuPanel.style.display = "none";
          removeClass(menuBtn, "active");
        }
      });

      bind(window, "beforeunload", function () {
        storeContent();
        storePrefs();
      });

      editor.focus();
      saveSelectionRange();
    })();
  </script>
</body>
</html>
